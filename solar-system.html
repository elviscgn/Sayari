<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      z-index: 10;
    }

    #hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 24px 32px;
    }

    #title-block h1 {
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(200, 220, 255, 0.5);
      font-weight: 400;
    }

    #title-block .sub {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: rgba(200, 220, 255, 0.25);
      margin-top: 4px;
    }

    #status-block {
      text-align: right;
    }

    #status-block .mode-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: rgba(255, 200, 100, 0.4);
      text-transform: uppercase;
    }

    #status-block .mode-value {
      font-size: 13px;
      letter-spacing: 0.15em;
      color: rgba(255, 220, 140, 0.8);
      margin-top: 2px;
    }

    /* Crosshair center */
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #crosshair.visible { opacity: 1; }

    #crosshair svg {
      width: 40px; height: 40px;
    }

    /* Bottom info bar */
    #info-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
      z-index: 10;
    }

    #controls-hint {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: rgba(150, 180, 255, 0.3);
      text-transform: uppercase;
      line-height: 1.8;
    }

    #coords {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(150, 180, 255, 0.25);
      text-align: right;
      line-height: 1.8;
    }

    /* Scan lines overlay for atmosphere */
    #scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 10, 30, 0.03) 2px,
        rgba(0, 10, 30, 0.03) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* Vignette */
    #vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 50%,
        rgba(0, 0, 10, 0.7) 100%
      );
      pointer-events: none;
      z-index: 6;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: #000010;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 1s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading .load-title {
      font-size: 10px;
      letter-spacing: 0.5em;
      color: rgba(200, 220, 255, 0.4);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    #loading-bar-wrap {
      width: 200px;
      height: 1px;
      background: rgba(100, 140, 255, 0.15);
      position: relative;
      overflow: hidden;
    }

    #loading-bar {
      position: absolute;
      left: -100%;
      top: 0; bottom: 0;
      width: 100%;
      background: linear-gradient(90deg, transparent, rgba(150, 200, 255, 0.8), transparent);
      animation: loadSweep 1.2s ease-in-out forwards;
    }

    @keyframes loadSweep {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    #loading .load-sub {
      margin-top: 20px;
      font-size: 8px;
      letter-spacing: 0.3em;
      color: rgba(150, 180, 255, 0.25);
      text-transform: uppercase;
    }
    /* ── Planet Detail Panel ───────────────────── */
    #planet-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 320px;
      z-index: 20;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
      padding: 36px 28px 32px;
      font-family: 'Courier New', monospace;

      /* glassmorphism base — accent color applied via JS */
      background: rgba(10, 10, 26, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-left: 1px solid rgba(255,255,255,0.08);

      /* accent border set dynamically */
      --accent: rgba(100, 160, 255, 0.6);
    }

    #planet-panel.open {
      transform: translateX(0);
    }

    /* top strip accent line */
    #planet-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0.8;
    }

    #panel-back {
      position: absolute;
      top: 18px; right: 20px;
      background: none;
      border: none;
      color: rgba(200, 210, 255, 0.4);
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.25em;
      cursor: pointer;
      text-transform: uppercase;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    #panel-back:hover { color: rgba(255,255,255,0.85); }

    #panel-type-badge {
      display: inline-block;
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 3px 10px;
      border: 1px solid var(--accent);
      color: var(--accent);
      margin-bottom: 14px;
      border-radius: 2px;
    }

    #panel-name {
      font-size: 32px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      font-weight: 400;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    #panel-divider {
      width: 100%;
      height: 1px;
      background: var(--accent);
      opacity: 0.3;
      margin: 22px 0;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 18px;
    }

    .stat-label {
      font-size: 8px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(160, 185, 220, 0.5);
    }

    .stat-value {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(220, 235, 255, 0.9);
      text-align: right;
      max-width: 160px;
    }

    #panel-divider-2 {
      width: 100%;
      height: 1px;
      background: var(--accent);
      opacity: 0.15;
      margin: 4px 0 22px;
    }

    #panel-funfact-label {
      font-size: 8px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(160, 185, 220, 0.5);
      margin-bottom: 10px;
    }

    #panel-funfact {
      font-size: 11px;
      letter-spacing: 0.04em;
      color: rgba(200, 220, 255, 0.75);
      line-height: 1.7;
      flex: 1;
    }

    #panel-enter-btn {
      margin-top: auto;
      padding: 14px 0;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      transition: background 0.25s, color 0.25s;
      animation: panelBtnPulse 2.4s ease-in-out infinite;
    }

    #panel-enter-btn:hover {
      background: var(--accent);
      color: #000;
      animation: none;
    }

    @keyframes panelBtnPulse {
      0%, 100% { opacity: 0.7; box-shadow: 0 0 0px var(--accent); }
      50%       { opacity: 1.0; box-shadow: 0 0 12px var(--accent); }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div class="load-title">Solar System</div>
    <div id="loading-bar-wrap">
      <div id="loading-bar"></div>
    </div>
    <div class="load-sub">Initializing deep space</div>
  </div>

  <!-- Three.js canvas -->
  <div id="canvas-container"></div>

  <!-- Atmospheric overlays -->
  <div id="scanlines"></div>
  <div id="vignette"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-top">
      <div id="title-block">
        <h1>Solar System</h1>
        <div class="sub">Heliocentric Model · Scale Simulation</div>
      </div>
      <div id="status-block">
        <div class="mode-label">Navigation Mode</div>
        <div class="mode-value" id="mode-display">FREE ROAM</div>
      </div>
    </div>
  </div>

  <!-- Crosshair -->
  <div id="crosshair">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="8" stroke="rgba(255,220,100,0.6)" stroke-width="0.5"/>
      <line x1="20" y1="4" x2="20" y2="12" stroke="rgba(255,220,100,0.4)" stroke-width="0.5"/>
      <line x1="20" y1="28" x2="20" y2="36" stroke="rgba(255,220,100,0.4)" stroke-width="0.5"/>
      <line x1="4" y1="20" x2="12" y2="20" stroke="rgba(255,220,100,0.4)" stroke-width="0.5"/>
      <line x1="28" y1="20" x2="36" y2="20" stroke="rgba(255,220,100,0.4)" stroke-width="0.5"/>
    </svg>
  </div>

  <!-- Planet Detail Panel -->
  <div id="planet-panel">
    <button id="panel-back">✕ Back</button>
    <div id="panel-type-badge">Rocky Planet</div>
    <div id="panel-name">Earth</div>
    <div id="panel-divider"></div>
    <div class="stat-row">
      <span class="stat-label">Orbit Distance</span>
      <span class="stat-value" id="stat-orbit">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Day Length</span>
      <span class="stat-value" id="stat-day">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Moons</span>
      <span class="stat-value" id="stat-moons">—</span>
    </div>
    <div id="panel-divider-2"></div>
    <div id="panel-funfact-label">Field Note</div>
    <div id="panel-funfact">—</div>
    <button id="panel-enter-btn">Enter Planet →</button>
  </div>


  <div id="info-bar">
    <div id="controls-hint">
      Drag · Rotate Camera<br>
      Scroll · Zoom<br>
      Click Planet · Lock On
    </div>
    <div id="coords">
      <span id="cam-x">X: 0.000</span><br>
      <span id="cam-y">Y: 80.000</span><br>
      <span id="cam-z">Z: 200.000</span>
    </div>
  </div>

  <!-- Three.js r128 from jsDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    // ─────────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────────
    const state = {
      mode: 'free-roam',   // 'free-roam' | 'locked'
      lockedPlanet: null,
    };

    const surfaceState = {
      active: false,
      scene: null,
      player: null,
      cameraIso: null,
      cameraThird: null,
      activeCam: null,
      camMode: 'isometric',
      terrain: null,
      seed: 0,
      playerDir: 0,
      zoom: 1,
      keys: {},
    };
    const surfaceRay = new THREE.Raycaster();
    const surfaceMouse = new THREE.Vector2();

    // ─────────────────────────────────────────────
    // SCENE SETUP
    // ─────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#000000');

    const W = window.innerWidth;
    const H = window.innerHeight;

    const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 5000);
    camera.position.set(0, 80, 200);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = false;
    renderer.toneMapping = THREE.NoToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // ─────────────────────────────────────────────
    // LIGHTS
    // ─────────────────────────────────────────────
    // Sun point light — warm yellow-white
    const sunLight = new THREE.PointLight('#fff5c0', 2, 600);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    // Ambient — soft blue-grey so dark sides are dim, never pitch black
    const ambientLight = new THREE.AmbientLight('#2a3550', 0.35);
    scene.add(ambientLight);

    // ─────────────────────────────────────────────
    // ORBIT CONTROLS (disabled until free-roam)
    // ─────────────────────────────────────────────
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 20;
    controls.maxDistance = 800;
    controls.enabled = true; // free-roam by default
    controls.target.set(0, 0, 0);

    // ─────────────────────────────────────────────
    // STARFIELD — 3000 points, boosted brightness, blue/white tints
    // ─────────────────────────────────────────────
    function buildStarfield() {
      const count = 3000;
      const positions = new Float32Array(count * 3);
      const colors    = new Float32Array(count * 3);

      const palette = [
        new THREE.Color('#ffffff'),
        new THREE.Color('#c8d8ff'),
        new THREE.Color('#a8c8ff'),
        new THREE.Color('#e8f0ff'),
        new THREE.Color('#fff8e8'),
        new THREE.Color('#ffeecc'),
      ];

      for (let i = 0; i < count; i++) {
        // Place stars on a sphere between r=600 and r=1200 —
        // close enough that sizeAttenuation keeps them visible
        const r     = 600 + Math.random() * 600;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);

        positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);

        const c = palette[Math.floor(Math.random() * palette.length)].clone();
        colors[i * 3]     = Math.min(c.r, 1);
        colors[i * 3 + 1] = Math.min(c.g, 1);
        colors[i * 3 + 2] = Math.min(c.b, 1);
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

      // Sharp bright star texture
      const starCanvas = document.createElement('canvas');
      starCanvas.width = starCanvas.height = 32;
      const ctx = starCanvas.getContext('2d');
      const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
      grad.addColorStop(0,   'rgba(255,255,255,1)');
      grad.addColorStop(0.2, 'rgba(220,235,255,1)');
      grad.addColorStop(0.5, 'rgba(180,210,255,0.6)');
      grad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 32, 32);
      const starTex = new THREE.CanvasTexture(starCanvas);

      const mat = new THREE.PointsMaterial({
        size: 2.5,
        map: starTex,
        vertexColors: true,
        transparent: true,
        opacity: 1.0,
        depthWrite: false,
        sizeAttenuation: false,   // screen-space pixels — always visible regardless of distance
        blending: THREE.AdditiveBlending,
      });

      const stars = new THREE.Points(geo, mat);
      scene.add(stars);
      return stars;
    }

    const starfield = buildStarfield();

    // ─────────────────────────────────────────────
    // NEBULA GLOW — large semi-transparent sphere with gradient texture
    // ─────────────────────────────────────────────
    function buildNebula() {
      // Create gradient texture on a canvas
      const size = 512;
      const nc = document.createElement('canvas');
      nc.width = nc.height = size;
      const ctx = nc.getContext('2d');

      // Deep space nebula gradient — muted blue/purple/teal, boosted opacity
      const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      grad.addColorStop(0,    'rgba(10,  20,  80,  0.0)');
      grad.addColorStop(0.3,  'rgba(8,   18,  70,  0.15)');
      grad.addColorStop(0.55, 'rgba(20,  40, 110,  0.35)');
      grad.addColorStop(0.7,  'rgba(30,  15,  90,  0.45)');
      grad.addColorStop(0.85, 'rgba(15,  35, 100,  0.38)');
      grad.addColorStop(1,    'rgba(5,   10,  50,  0.0)');

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      // Second asymmetric blot — indigo/violet tint for depth
      const grad2 = ctx.createRadialGradient(size * 0.3, size * 0.4, 0, size * 0.3, size * 0.4, size * 0.55);
      grad2.addColorStop(0,   'rgba(50,  80, 180, 0.3)');
      grad2.addColorStop(0.4, 'rgba(20,  45, 120, 0.2)');
      grad2.addColorStop(0.7, 'rgba(10,  20,  80, 0.1)');
      grad2.addColorStop(1,   'rgba(0,    0,   0, 0)');
      ctx.fillStyle = grad2;
      ctx.fillRect(0, 0, size, size);

      // Third blot — warm purple accent opposite side
      const grad3 = ctx.createRadialGradient(size * 0.72, size * 0.6, 0, size * 0.72, size * 0.6, size * 0.4);
      grad3.addColorStop(0,   'rgba(80,  30, 120, 0.2)');
      grad3.addColorStop(0.5, 'rgba(40,  15,  80, 0.12)');
      grad3.addColorStop(1,   'rgba(0,    0,   0, 0)');
      ctx.fillStyle = grad3;
      ctx.fillRect(0, 0, size, size);

      const nebulaTex = new THREE.CanvasTexture(nc);

      const geo = new THREE.SphereGeometry(1200, 32, 32);
      const mat = new THREE.MeshBasicMaterial({
        map: nebulaTex,
        side: THREE.BackSide,
        transparent: true,
        opacity: 0.02,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      const nebula = new THREE.Mesh(geo, mat);
      scene.add(nebula);
      return nebula;
    }

    const nebula = buildNebula();

    // ─────────────────────────────────────────────
    // SUN — ShaderMaterial with animated noise surface
    // ─────────────────────────────────────────────
    function buildSun() {
      // ── Animated surface shader ──────────────────
      const sunVert = `
        varying vec2 vUv;
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
          vUv = uv;
          vNormal = normalize(normalMatrix * normal);
          vPosition = position;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;

      const sunFrag = `
        uniform float uTime;
        varying vec2 vUv;
        varying vec3 vNormal;
        varying vec3 vPosition;

        // ── Simplex-style noise helpers ───────────
        vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314*r; }

        float snoise(vec3 v) {
          const vec2 C = vec2(1.0/6.0, 1.0/3.0);
          const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
          vec3 i = floor(v + dot(v, C.yyy));
          vec3 x0 = v - i + dot(i, C.xxx);
          vec3 g = step(x0.yzx, x0.xyz);
          vec3 l = 1.0 - g;
          vec3 i1 = min(g.xyz, l.zxy);
          vec3 i2 = max(g.xyz, l.zxy);
          vec3 x1 = x0 - i1 + C.xxx;
          vec3 x2 = x0 - i2 + C.yyy;
          vec3 x3 = x0 - D.yyy;
          i = mod289(i);
          vec4 p = permute(permute(permute(
            i.z + vec4(0.0, i1.z, i2.z, 1.0))
            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
          float n_ = 0.142857142857;
          vec3 ns = n_ * D.wyz - D.xzx;
          vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
          vec4 x_ = floor(j * ns.z);
          vec4 y_ = floor(j - 7.0 * x_);
          vec4 x = x_ *ns.x + ns.yyyy;
          vec4 y = y_ *ns.x + ns.yyyy;
          vec4 h = 1.0 - abs(x) - abs(y);
          vec4 b0 = vec4(x.xy, y.xy);
          vec4 b1 = vec4(x.zw, y.zw);
          vec4 s0 = floor(b0)*2.0 + 1.0;
          vec4 s1 = floor(b1)*2.0 + 1.0;
          vec4 sh = -step(h, vec4(0.0));
          vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
          vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
          vec3 p0 = vec3(a0.xy, h.x);
          vec3 p1 = vec3(a0.zw, h.y);
          vec3 p2 = vec3(a1.xy, h.z);
          vec3 p3 = vec3(a1.zw, h.w);
          vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
          p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
          vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
          m = m * m;
          return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
        }

        // Fractal Brownian Motion — layers of noise
        float fbm(vec3 p) {
          float v = 0.0;
          float amp = 0.5;
          float freq = 1.0;
          for (int i = 0; i < 6; i++) {
            v += amp * snoise(p * freq);
            amp  *= 0.5;
            freq *= 2.1;
          }
          return v;
        }

        void main() {
          // Animate surface with scrolling noise
          vec3 p = vPosition * 0.18;
          float t1 = uTime * 0.12;
          float t2 = uTime * 0.07;

          float n1 = fbm(p + vec3(t1, t2, t1 * 0.5));
          float n2 = fbm(p * 1.8 - vec3(t2, t1, t2 * 0.8) + 3.7);
          float turb = n1 * 0.6 + n2 * 0.4;
          turb = turb * 0.5 + 0.5; // remap 0..1

          // Sunspot-like dark patches
          float spots = fbm(p * 2.5 + vec3(uTime * 0.04));
          spots = smoothstep(0.55, 0.75, spots);

          // Colour gradient: deep red → orange → yellow → white core
          vec3 colDeep  = vec3(0.85, 0.12, 0.02);
          vec3 colMid   = vec3(1.00, 0.45, 0.05);
          vec3 colBright= vec3(1.00, 0.80, 0.25);
          vec3 colHot   = vec3(1.00, 0.97, 0.80);

          vec3 col = mix(colDeep, colMid,    smoothstep(0.0,  0.4, turb));
          col      = mix(col,     colBright, smoothstep(0.35, 0.65, turb));
          col      = mix(col,     colHot,    smoothstep(0.60, 1.0,  turb));

          // Apply sunspot darkening
          col *= 1.0 - spots * 0.5;

          // Limb darkening — edges slightly cooler/dimmer
          float limb = dot(normalize(vNormal), vec3(0.0, 0.0, 1.0));
          limb = pow(abs(limb), 0.4);
          col *= 0.55 + 0.45 * limb;

          gl_FragColor = vec4(col, 1.0);
        }
      `;

      const sunMat = new THREE.ShaderMaterial({
        vertexShader:   sunVert,
        fragmentShader: sunFrag,
        uniforms: {
          uTime: { value: 0.0 },
        },
      });

      const sunGeo  = new THREE.SphereGeometry(12, 80, 80);
      const sunMesh = new THREE.Mesh(sunGeo, sunMat);
      sunMesh.castShadow    = false;
      sunMesh.receiveShadow = false;
      sunMesh.userData.isSun = true;  // flag: not clickable
      scene.add(sunMesh);

      // ── Corona sphere (r=14, additive gradient texture) ──
      const coronaSize = 256;
      const cc = document.createElement('canvas');
      cc.width = cc.height = coronaSize;
      const cctx = cc.getContext('2d');
      const cg = cctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      cg.addColorStop(0.0,  'rgba(255, 245, 180, 0.95)');
      cg.addColorStop(0.25, 'rgba(255, 200,  80, 0.55)');
      cg.addColorStop(0.55, 'rgba(255, 120,  20, 0.18)');
      cg.addColorStop(0.8,  'rgba(200,  60,   0, 0.05)');
      cg.addColorStop(1.0,  'rgba(0,     0,   0, 0.0)');
      cctx.fillStyle = cg;
      cctx.fillRect(0, 0, coronaSize, coronaSize);
      const coronaTex = new THREE.CanvasTexture(cc);

      const coronaGeo  = new THREE.SphereGeometry(14, 48, 48);
      const coronaMat  = new THREE.MeshBasicMaterial({
        map: coronaTex,
        transparent: true,
        opacity: 0.85,
        side: THREE.FrontSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const coronaMesh = new THREE.Mesh(coronaGeo, coronaMat);
      coronaMesh.userData.isSun = true;
      scene.add(coronaMesh);

      // Outer diffuse halo
      const haloGeo = new THREE.SphereGeometry(20, 32, 32);
      const haloMat = new THREE.MeshBasicMaterial({
        color: '#ff7700',
        transparent: true,
        opacity: 0.06,
        side: THREE.BackSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const haloMesh = new THREE.Mesh(haloGeo, haloMat);
      haloMesh.userData.isSun = true;
      scene.add(haloMesh);

      // ── Lens flare sprites ────────────────────────
      function makeFlareTexture(innerAlpha, outerColor, size) {
        const fc = document.createElement('canvas');
        fc.width = fc.height = size;
        const fctx = fc.getContext('2d');
        const half = size / 2;
        const fg = fctx.createRadialGradient(half, half, 0, half, half, half);
        fg.addColorStop(0.0,  `rgba(255, 250, 200, ${innerAlpha})`);
        fg.addColorStop(0.15, `rgba(${outerColor}, ${innerAlpha * 0.6})`);
        fg.addColorStop(0.5,  `rgba(${outerColor}, ${innerAlpha * 0.15})`);
        fg.addColorStop(1.0,  'rgba(0, 0, 0, 0)');
        fctx.fillStyle = fg;
        fctx.fillRect(0, 0, size, size);
        return new THREE.CanvasTexture(fc);
      }

      const flareSpecs = [
        { scale: 28,  opacity: 0.55, texInner: 0.9,  outerCol: '255, 200, 80',  offset: new THREE.Vector3(0, 0, 0) },
        { scale: 50,  opacity: 0.22, texInner: 0.5,  outerCol: '255, 140, 30',  offset: new THREE.Vector3(0, 0, 0) },
        { scale: 90,  opacity: 0.10, texInner: 0.3,  outerCol: '200,  80,  0',  offset: new THREE.Vector3(0, 0, 0) },
        { scale: 14,  opacity: 0.70, texInner: 1.0,  outerCol: '255, 240, 180', offset: new THREE.Vector3(0, 0, 0) },
      ];

      const flareSprites = flareSpecs.map(spec => {
        const tex = makeFlareTexture(spec.texInner, spec.outerCol, 256);
        const mat = new THREE.SpriteMaterial({
          map: tex,
          transparent: true,
          opacity: spec.opacity,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.setScalar(spec.scale);
        sprite.position.copy(spec.offset);
        sprite.userData.isSun = true;
        scene.add(sprite);
        return { sprite, ...spec };
      });

      return { sunMesh, sunMat, coronaMesh, haloMesh, flareSprites };
    }

    const sunObjects = buildSun();

    // ─────────────────────────────────────────────
    // PLANET FACTORY (placeholder — planets to be added later)
    // ─────────────────────────────────────────────
    // ─────────────────────────────────────────────
    // PLANET DATA — bigger radii, spread orbits, per-planet character
    // ─────────────────────────────────────────────
    const planetData = [
      { name: 'Mercury', radius: 3.2,  orbitR: 38,  speed: 4.15,  tilt: 0.03,  atmColor: null,        type: 'mercury' },
      { name: 'Venus',   radius: 5.5,  orbitR: 58,  speed: 1.62,  tilt: 0.05,  atmColor: '#e8c97a',   type: 'venus'   },
      { name: 'Earth',   radius: 6.0,  orbitR: 80,  speed: 1.0,   tilt: 0.41,  atmColor: '#4fa3e0',   type: 'earth'   },
      { name: 'Mars',    radius: 4.5,  orbitR: 106, speed: 0.53,  tilt: 0.44,  atmColor: '#c1440e',   type: 'mars'    },
      { name: 'Jupiter', radius: 14.0, orbitR: 152, speed: 0.084, tilt: 0.05,  atmColor: '#c8a060',   type: 'jupiter' },
      { name: 'Saturn',  radius: 12.0, orbitR: 200, speed: 0.034, tilt: 0.47,  atmColor: '#d4bb80',   type: 'saturn'  },
      { name: 'Uranus',  radius: 9.0,  orbitR: 244, speed: 0.012, tilt: 1.71,  atmColor: '#7de8e8',   type: 'uranus'  },
      { name: 'Neptune', radius: 8.5,  orbitR: 284, speed: 0.006, tilt: 0.49,  atmColor: '#4466ee',   type: 'neptune' },
    ];

    const planets = [];

    // ── Orbit ring ────────────────────────────────
    function buildOrbitRing(radius) {
      const pts = [];
      for (let i = 0; i <= 128; i++) {
        const a = (i / 128) * Math.PI * 2;
        pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
      }
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({ color: '#3a6090', transparent: true, opacity: 0.7, depthWrite: false });
      return new THREE.Line(geo, mat);
    }

    // ── Per-planet procedural textures ───────────
    function makePlanetTexture(type) {
      const S = 512;
      const pc = document.createElement('canvas');
      pc.width = pc.height = S;
      const ctx = pc.getContext('2d');

      const rng = (() => { let s = type.split('').reduce((a,c)=>a+c.charCodeAt(0),0); return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; })();

      if (type === 'mercury') {
        ctx.fillStyle = '#8c8680'; ctx.fillRect(0,0,S,S);
        for (let i=0;i<120;i++) {
          const x=rng()*S, y=rng()*S, r=2+rng()*18;
          const g=ctx.createRadialGradient(x,y,0,x,y,r);
          g.addColorStop(0,'rgba(40,35,30,0.7)'); g.addColorStop(0.4,'rgba(60,55,50,0.3)'); g.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
        }
        // bright rims on craters
        for (let i=0;i<40;i++) {
          const x=rng()*S, y=rng()*S, r=3+rng()*12;
          ctx.strokeStyle=`rgba(200,190,180,${0.1+rng()*0.2})`; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
        }

      } else if (type === 'venus') {
        ctx.fillStyle='#d4a855'; ctx.fillRect(0,0,S,S);
        for (let y=0;y<S;y+=3) {
          const bright=0.85+0.15*Math.sin(y*0.06+rng()*2);
          ctx.fillStyle=`rgba(${Math.round(220*bright)},${Math.round(160*bright)},${Math.round(60*bright)},0.25)`;
          ctx.fillRect(0,y,S,3);
        }
        for (let i=0;i<60;i++) {
          const x=rng()*S, y=rng()*S, w=20+rng()*120, h=4+rng()*12;
          ctx.fillStyle=`rgba(255,200,80,${0.05+rng()*0.12})`;
          ctx.fillRect(x,y,w,h);
        }

      } else if (type === 'earth') {
        // ocean base
        ctx.fillStyle='#1a5fa8'; ctx.fillRect(0,0,S,S);
        // continents
        const continents=[
          {x:0.15,y:0.25,w:0.18,h:0.35,col:'#3a8a3a'},
          {x:0.38,y:0.2, w:0.22,h:0.45,col:'#4a9a40'},
          {x:0.62,y:0.15,w:0.28,h:0.55,col:'#5a8a35'},
          {x:0.05,y:0.55,w:0.14,h:0.22,col:'#c8a050'},
          {x:0.6, y:0.65,w:0.25,h:0.25,col:'#8ab840'},
        ];
        continents.forEach(c=>{
          const cx=c.x*S, cy=c.y*S, cw=c.w*S, ch=c.h*S;
          for (let i=0;i<30;i++) {
            const bx=cx+(rng()-0.5)*cw, by=cy+(rng()-0.5)*ch;
            const r=cw*0.15+rng()*cw*0.3;
            const g=ctx.createRadialGradient(bx,by,0,bx,by,r);
            g.addColorStop(0,c.col+'dd'); g.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
          }
        });
        // polar caps
        const pg1=ctx.createRadialGradient(S/2,0,0,S/2,0,S*0.18);
        pg1.addColorStop(0,'rgba(240,248,255,0.95)'); pg1.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=pg1; ctx.fillRect(0,0,S,S);
        const pg2=ctx.createRadialGradient(S/2,S,0,S/2,S,S*0.14);
        pg2.addColorStop(0,'rgba(240,248,255,0.9)'); pg2.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=pg2; ctx.fillRect(0,0,S,S);
        // cloud wisps
        for (let i=0;i<80;i++) {
          const x=rng()*S, y=rng()*S, w=30+rng()*90, h=5+rng()*15;
          ctx.fillStyle=`rgba(255,255,255,${0.05+rng()*0.15})`;
          ctx.fillRect(x,y,w,h);
        }

      } else if (type === 'mars') {
        ctx.fillStyle='#9c3a1a'; ctx.fillRect(0,0,S,S);
        // terrain variation
        for (let i=0;i<200;i++) {
          const x=rng()*S, y=rng()*S, r=10+rng()*60;
          const bright=0.7+rng()*0.5;
          const g=ctx.createRadialGradient(x,y,0,x,y,r);
          g.addColorStop(0,`rgba(${Math.round(180*bright)},${Math.round(80*bright)},${Math.round(30*bright)},0.3)`);
          g.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
        }
        // Valles Marineris-style canyon
        ctx.strokeStyle='rgba(60,15,5,0.5)'; ctx.lineWidth=8;
        ctx.beginPath(); ctx.moveTo(S*0.1,S*0.45); ctx.bezierCurveTo(S*0.35,S*0.43,S*0.65,S*0.5,S*0.9,S*0.48); ctx.stroke();
        // polar cap
        const pg=ctx.createRadialGradient(S/2,0,0,S/2,0,S*0.12);
        pg.addColorStop(0,'rgba(240,240,255,0.9)'); pg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=pg; ctx.fillRect(0,0,S,S);

      } else if (type === 'jupiter') {
        ctx.fillStyle='#c8955a'; ctx.fillRect(0,0,S,S);
        // horizontal bands
        const bands=[
          {y:0.0,h:0.08,col:'rgba(210,160,90,0.7)'},  {y:0.08,h:0.06,col:'rgba(160,80,40,0.6)'},
          {y:0.14,h:0.1, col:'rgba(220,175,110,0.5)'}, {y:0.24,h:0.07,col:'rgba(140,70,35,0.7)'},
          {y:0.31,h:0.12,col:'rgba(215,165,95,0.5)'},  {y:0.43,h:0.05,col:'rgba(180,100,50,0.65)'},
          {y:0.48,h:0.09,col:'rgba(230,185,120,0.5)'}, {y:0.57,h:0.06,col:'rgba(150,75,38,0.7)'},
          {y:0.63,h:0.11,col:'rgba(210,160,85,0.55)'}, {y:0.74,h:0.07,col:'rgba(170,90,45,0.6)'},
          {y:0.81,h:0.19,col:'rgba(220,170,100,0.5)'},
        ];
        bands.forEach(b=>{ ctx.fillStyle=b.col; ctx.fillRect(0,b.y*S,S,b.h*S); });
        // wavy band edges
        for (let i=0;i<8;i++) {
          const y=(0.1+i*0.11)*S;
          ctx.strokeStyle=`rgba(100,50,20,${0.15+rng()*0.15})`; ctx.lineWidth=3+rng()*4;
          ctx.beginPath(); ctx.moveTo(0,y);
          for (let x=0;x<=S;x+=20) ctx.lineTo(x,y+Math.sin(x*0.05+rng()*6)*8);
          ctx.stroke();
        }
        // Great Red Spot
        const gx=S*0.62, gy=S*0.58, grx=S*0.10, gry=S*0.055;
        const gg=ctx.createRadialGradient(gx,gy,0,gx,gy,grx);
        gg.addColorStop(0,'rgba(180,50,20,0.85)'); gg.addColorStop(0.5,'rgba(200,80,40,0.6)'); gg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.save(); ctx.scale(1,gry/grx); ctx.fillStyle=gg; ctx.fillRect(0,0,S,S*grx/gry); ctx.restore();

      } else if (type === 'saturn') {
        ctx.fillStyle='#c8b080'; ctx.fillRect(0,0,S,S);
        const sbands=[
          {y:0.0, h:0.1, col:'rgba(200,175,110,0.6)'}, {y:0.1, h:0.08,col:'rgba(160,130,75,0.55)'},
          {y:0.18,h:0.14,col:'rgba(215,190,130,0.5)'}, {y:0.32,h:0.06,col:'rgba(170,140,85,0.6)'},
          {y:0.38,h:0.15,col:'rgba(210,185,120,0.5)'}, {y:0.53,h:0.07,col:'rgba(165,135,80,0.55)'},
          {y:0.60,h:0.14,col:'rgba(205,180,115,0.5)'}, {y:0.74,h:0.26,col:'rgba(195,170,105,0.55)'},
        ];
        sbands.forEach(b=>{ ctx.fillStyle=b.col; ctx.fillRect(0,b.y*S,S,b.h*S); });

      } else if (type === 'uranus') {
        // blue-green smooth gradient
        const ug=ctx.createLinearGradient(0,0,0,S);
        ug.addColorStop(0,'#5dd4d4'); ug.addColorStop(0.4,'#7de8d8'); ug.addColorStop(0.7,'#6acccc'); ug.addColorStop(1,'#4ab8b8');
        ctx.fillStyle=ug; ctx.fillRect(0,0,S,S);
        // faint band hints
        for (let i=0;i<6;i++) {
          ctx.fillStyle=`rgba(100,220,220,${0.05+rng()*0.08})`;
          ctx.fillRect(0,(0.1+i*0.15)*S,S,S*0.07);
        }

      } else if (type === 'neptune') {
        const ng=ctx.createLinearGradient(0,0,0,S);
        ng.addColorStop(0,'#1a3acc'); ng.addColorStop(0.5,'#2244dd'); ng.addColorStop(1,'#1528aa');
        ctx.fillStyle=ng; ctx.fillRect(0,0,S,S);
        // storm bands
        for (let i=0;i<5;i++) {
          ctx.fillStyle=`rgba(80,120,255,${0.12+rng()*0.15})`;
          ctx.fillRect(0,(0.08+i*0.18)*S,S,S*0.08);
        }
        // Great Dark Spot
        const nx=S*0.4, ny=S*0.45;
        const ndg=ctx.createRadialGradient(nx,ny,0,nx,ny,S*0.09);
        ndg.addColorStop(0,'rgba(10,20,100,0.8)'); ndg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=ndg; ctx.fillRect(0,0,S,S);
        // white cloud streaks
        for (let i=0;i<20;i++) {
          ctx.fillStyle=`rgba(180,200,255,${0.08+rng()*0.12})`;
          ctx.fillRect(rng()*S,(0.2+rng()*0.6)*S,20+rng()*80,3+rng()*6);
        }
      }

      return new THREE.CanvasTexture(pc);
    }

    // ── Atmosphere sprite for a planet ───────────
    function makeAtmosphere(radius, color) {
      const ac = document.createElement('canvas');
      ac.width = ac.height = 256;
      const actx = ac.getContext('2d');
      const ag = actx.createRadialGradient(128,128,128*0.72,128,128,128);
      const c = new THREE.Color(color);
      const r=Math.round(c.r*255), g=Math.round(c.g*255), b=Math.round(c.b*255);
      ag.addColorStop(0,  `rgba(${r},${g},${b},0.0)`);
      ag.addColorStop(0.4,`rgba(${r},${g},${b},0.18)`);
      ag.addColorStop(0.75,`rgba(${r},${g},${b},0.35)`);
      ag.addColorStop(1,  `rgba(${r},${g},${b},0.0)`);
      actx.fillStyle=ag; actx.fillRect(0,0,256,256);
      const atex = new THREE.CanvasTexture(ac);
      const amat = new THREE.SpriteMaterial({ map:atex, transparent:true, opacity:0.7, depthWrite:false, blending:THREE.AdditiveBlending });
      const asp = new THREE.Sprite(amat);
      asp.scale.setScalar(radius * 2.8);
      return asp;
    }

    // ── Hover ring ────────────────────────────────
    function makeHoverRing(radius) {
      const pts = [];
      for (let i=0;i<=64;i++) { const a=(i/64)*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(a)*(radius+0.8),Math.sin(a)*(radius+0.8),0)); }
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({ color:'#ffffff', transparent:true, opacity:0, depthWrite:false });
      const ring = new THREE.Line(geo, mat);
      ring.visible = false;
      return ring;
    }

    // ── Labels container ─────────────────────────
    const labelContainer = document.createElement('div');
    labelContainer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:8;';
    document.body.appendChild(labelContainer);

    const labelEls = {};

    // ── Build planets ─────────────────────────────
    planetData.forEach(pd => {
      const geo = new THREE.SphereGeometry(pd.radius, 56, 56);
      const tex = makePlanetTexture(pd.type);
      const mat = new THREE.MeshBasicMaterial({ map: tex });
      const mesh = new THREE.Mesh(geo, mat);

      // Axial tilt
      mesh.rotation.z = pd.tilt;

      mesh.userData = { name: pd.name, orbitR: pd.orbitR, speed: pd.speed, radius: pd.radius };

      const angle = Math.random() * Math.PI * 2;
      mesh.position.set(Math.cos(angle) * pd.orbitR, 0, Math.sin(angle) * pd.orbitR);
      mesh.userData.angle = angle;

      scene.add(mesh);
      scene.add(buildOrbitRing(pd.orbitR));

      // Atmosphere glow sprite
      if (pd.atmColor) {
        const atm = makeAtmosphere(pd.radius, pd.atmColor);
        mesh.add(atm);
      }

      // Hover ring (billboard — add to scene, not mesh, managed manually)
      const hring = makeHoverRing(pd.radius);
      mesh.add(hring);
      mesh.userData.hoverRing = hring;

      // Saturn rings — wider, multi-band
      if (pd.name === 'Saturn') {
        const ringGroups = [
          { inner: 1.25, outer: 1.55, color: 'rgba(200,180,120,0.25)' },
          { inner: 1.55, outer: 1.85, color: 'rgba(210,185,130,0.55)' },
          { inner: 1.85, outer: 2.15, color: 'rgba(195,170,110,0.45)' },
          { inner: 2.15, outer: 2.45, color: 'rgba(180,155,100,0.3)'  },
          { inner: 2.45, outer: 2.65, color: 'rgba(170,145,90,0.15)'  },
        ];
        ringGroups.forEach(rg => {
          const rc = document.createElement('canvas');
          rc.width = 256; rc.height = 1;
          const rctx = rc.getContext('2d');
          const rgrad = rctx.createLinearGradient(0,0,256,0);
          rgrad.addColorStop(0, 'rgba(0,0,0,0)');
          rgrad.addColorStop(0.1, rg.color);
          rgrad.addColorStop(0.9, rg.color);
          rgrad.addColorStop(1, 'rgba(0,0,0,0)');
          rctx.fillStyle = rgrad; rctx.fillRect(0,0,256,1);
          const rtex = new THREE.CanvasTexture(rc);

          const rgeo = new THREE.RingGeometry(pd.radius * rg.inner, pd.radius * rg.outer, 80);
          // fix ring UVs
          const pos = rgeo.attributes.position, uv = rgeo.attributes.uv, v3 = new THREE.Vector3();
          for (let i=0;i<pos.count;i++) {
            v3.fromBufferAttribute(pos,i);
            const norm = (v3.length() - pd.radius*rg.inner) / (pd.radius*(rg.outer-rg.inner));
            uv.setXY(i, norm, 0.5);
          }
          const rmat = new THREE.MeshBasicMaterial({ map:rtex, side:THREE.DoubleSide, transparent:true, opacity:1, depthWrite:false });
          const rmesh = new THREE.Mesh(rgeo, rmat);
          rmesh.rotation.x = Math.PI / 2;
          mesh.add(rmesh);
        });
      }

      // Uranus rings (thin, vertical-ish due to extreme tilt)
      if (pd.name === 'Uranus') {
        const urgeo = new THREE.RingGeometry(pd.radius*1.3, pd.radius*1.6, 64);
        const urmat = new THREE.MeshBasicMaterial({ color:'#88dddd', side:THREE.DoubleSide, transparent:true, opacity:0.18, depthWrite:false });
        const urmesh = new THREE.Mesh(urgeo, urmat);
        urmesh.rotation.x = Math.PI/2;
        mesh.add(urmesh);
      }

      // Label
      const lel = document.createElement('div');
      lel.textContent = pd.name.toUpperCase();
      lel.style.cssText = `
        position:absolute; font-family:'Courier New',monospace; font-size:9px;
        letter-spacing:0.25em; color:rgba(180,210,255,0.5); pointer-events:none;
        transform:translateX(-50%); text-shadow:0 0 8px rgba(100,160,255,0.4);
        transition:opacity 0.3s; white-space:nowrap;
      `;
      labelContainer.appendChild(lel);
      labelEls[pd.name] = lel;

      planets.push(mesh);
    });

    // ── Hover detection ───────────────────────────
    let hoveredPlanet = null;
    const mousePosRaw = new THREE.Vector2();

    renderer.domElement.addEventListener('mousemove', e => {
      const nx = (e.clientX / window.innerWidth) * 2 - 1;
      const ny = -(e.clientY / window.innerHeight) * 2 + 1;
      mousePosRaw.x = nx;
      mousePosRaw.y = ny;

      if (surfaceState.active && surfaceState.terrain && surfaceState.player) {
        surfaceMouse.set(nx, ny);
        surfaceRay.setFromCamera(surfaceMouse, surfaceState.activeCam);
        const hits = surfaceRay.intersectObject(surfaceState.terrain);
        if (hits.length > 0) {
          const p = hits[0].point;
          const dx = p.x - surfaceState.player.position.x;
          const dz = p.z - surfaceState.player.position.z;
          surfaceState.playerDir = Math.atan2(dx, dz);
        }
      }
    });

    // ─────────────────────────────────────────────
    // RAYCASTER for click interaction
    // ─────────────────────────────────────────────
    const raycaster  = new THREE.Raycaster();
    const mouse      = new THREE.Vector2();

    renderer.domElement.addEventListener('click', e => {
      if (surfaceState.active) return;
      mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(planets);
      if (hits.length > 0) {
        const planet = hits[0].object;
        lockOnPlanet(planet);
      } else if (state.mode === 'locked') {
        enterFreeRoam();
      }
    });

    document.addEventListener('keydown', e => {
      surfaceState.keys[e.code] = true;
      if (e.code === 'KeyV' && surfaceState.active) {
        surfaceState.camMode = surfaceState.camMode === 'isometric' ? 'third-person' : 'isometric';
        surfaceState.activeCam = surfaceState.camMode === 'isometric' ? surfaceState.cameraIso : surfaceState.cameraThird;
      }
      if (e.code === 'Escape' && surfaceState.active) {
        e.preventDefault();
        returnToSolar();
      }
    });
    document.addEventListener('keyup', e => { surfaceState.keys[e.code] = false; });

    renderer.domElement.addEventListener('wheel', e => {
      if (!surfaceState.active) return;
      surfaceState.zoom = Math.max(0.3, Math.min(5, surfaceState.zoom + e.deltaY * 0.005));
    }, { passive: true });

    // ─────────────────────────────────────────────
    // PLANET INFO DATA
    // ─────────────────────────────────────────────
    const PLANET_INFO = {
      Mercury: {
        type: 'Rocky Planet',
        accentColor: 'rgba(180, 165, 145, 0.75)',
        orbit: '57.9 million km',
        day: '1,408 hours',
        moons: 'None',
        fact: 'Despite being closest to the Sun, Mercury is not the hottest planet — its lack of atmosphere means heat escapes instantly at night, dropping to −180 °C.',
      },
      Venus: {
        type: 'Rocky Planet',
        accentColor: 'rgba(220, 185, 90, 0.75)',
        orbit: '108.2 million km',
        day: '5,832 hours',
        moons: 'None',
        fact: 'Venus rotates backwards relative to most planets, so the Sun rises in the west. A day on Venus is longer than its year.',
      },
      Earth: {
        type: 'Rocky Planet',
        accentColor: 'rgba(80, 160, 230, 0.75)',
        orbit: '149.6 million km',
        day: '24 hours',
        moons: '1 (Luna)',
        fact: 'Earth\'s magnetic field deflects solar wind, creating the auroras. Without it, the atmosphere would be slowly stripped away by radiation.',
      },
      Mars: {
        type: 'Rocky Planet',
        accentColor: 'rgba(200, 80, 40, 0.75)',
        orbit: '227.9 million km',
        day: '24.6 hours',
        moons: '2 (Phobos, Deimos)',
        fact: 'Olympus Mons on Mars is the tallest volcano in the solar system — nearly three times the height of Everest and wide enough to cover France.',
      },
      Jupiter: {
        type: 'Gas Giant',
        accentColor: 'rgba(200, 148, 80, 0.75)',
        orbit: '778.5 million km',
        day: '9.9 hours',
        moons: '95 known',
        fact: 'Jupiter\'s Great Red Spot is a storm that has raged for at least 350 years. It\'s wider than the entire Earth — though it has been shrinking.',
      },
      Saturn: {
        type: 'Gas Giant',
        accentColor: 'rgba(210, 185, 120, 0.75)',
        orbit: '1.43 billion km',
        day: '10.7 hours',
        moons: '146 known',
        fact: 'Saturn is so low in density it would float in water. Its ring system spans 282,000 km but is only about 10 metres thick in places.',
      },
      Uranus: {
        type: 'Ice Giant',
        accentColor: 'rgba(100, 220, 220, 0.75)',
        orbit: '2.87 billion km',
        day: '17.2 hours',
        moons: '28 known',
        fact: 'Uranus rotates on its side with an axial tilt of 98°, likely caused by a massive collision early in the solar system\'s history.',
      },
      Neptune: {
        type: 'Ice Giant',
        accentColor: 'rgba(60, 100, 230, 0.75)',
        orbit: '4.50 billion km',
        day: '16.1 hours',
        moons: '16 known',
        fact: 'Neptune has the fastest winds in the solar system — up to 2,100 km/h. Its moon Triton orbits backwards and will eventually be torn apart to form a new ring system.',
      },
    };

    // ─────────────────────────────────────────────
    // PANEL LOGIC
    // ─────────────────────────────────────────────
    const panel = document.getElementById('planet-panel');

    function openPanel(name) {
      const info = PLANET_INFO[name];
      if (!info) return;

      // Set accent CSS variable
      panel.style.setProperty('--accent', info.accentColor);
      panel.style.borderLeftColor = info.accentColor.replace('0.75', '0.25');

      // Populate content
      document.getElementById('panel-type-badge').textContent = info.type;
      document.getElementById('panel-name').textContent = name.toUpperCase();
      document.getElementById('stat-orbit').textContent = info.orbit;
      document.getElementById('stat-day').textContent   = info.day;
      document.getElementById('stat-moons').textContent = info.moons;
      document.getElementById('panel-funfact').textContent = info.fact;

      // Slide in
      panel.classList.add('open');
    }

    function closePanel() {
      panel.classList.remove('open');
    }

    document.getElementById('panel-back').addEventListener('click', () => {
      closePanel();
      enterFreeRoam();
    });

    document.getElementById('panel-enter-btn').addEventListener('click', () => {
      const mesh = state.lockedPlanet;
      if (!mesh) return;
      closePanel();
      const name = encodeURIComponent(mesh.userData.name);
      window.location.href = 'surface.html?planet=' + name;
    });

    function lockOnPlanet(planetMesh) {
      state.mode = 'locked';
      state.lockedPlanet = planetMesh;
      controls.enabled = false;
      document.getElementById('mode-display').textContent = planetMesh.userData.name.toUpperCase();
      document.getElementById('crosshair').classList.add('visible');
      openPanel(planetMesh.userData.name);
    }

    function enterFreeRoam() {
      state.mode = 'free-roam';
      state.lockedPlanet = null;
      controls.enabled = true;
      controls.target.set(0, 0, 0);
      document.getElementById('mode-display').textContent = 'FREE ROAM';
      document.getElementById('crosshair').classList.remove('visible');
      closePanel();
    }

    // ─────────────────────────────────────────────
    // SURFACE SCENE
    // ─────────────────────────────────────────────
    function simpleNoise(x, z, seed) {
      return Math.sin(x * 0.08 + seed) * Math.cos(z * 0.08 + seed * 1.3) * 2.0
           + Math.sin(x * 0.15 + seed * 2.7) * Math.cos(z * 0.12 + seed * 0.9) * 1.0
           + Math.sin(x * 0.30 + seed * 5.1) * Math.cos(z * 0.35 + seed * 3.7) * 0.4;
    }

    function terrainHeight(x, z, seed) {
      return simpleNoise(x, z, seed);
    }

    function buildSurfaceScene(planetName) {
      const sScene = new THREE.Scene();
      const seed = planetName.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      const info = PLANET_INFO[planetName];
      const accentRGB = info.accentColor.replace('rgba(', '').replace(')', '').split(',').slice(0, 3).map(v => parseInt(v.trim()) / 255);
      const accent = new THREE.Color(accentRGB[0], accentRGB[1], accentRGB[2]);

      const terrainGeo = new THREE.PlaneGeometry(80, 80, 48, 48);
      terrainGeo.rotateX(-Math.PI / 2);
      const pos = terrainGeo.attributes.position;
      const cols = new Float32Array(pos.count * 3);
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = pos.getZ(i);
        const h = simpleNoise(x, z, seed);
        pos.setY(i, h);
        const t = (h + 3) / 6;
        const c = accent.clone().lerp(new THREE.Color(1, 1, 1), t * 0.5);
        cols[i * 3] = c.r;
        cols[i * 3 + 1] = c.g;
        cols[i * 3 + 2] = c.b;
      }
      pos.needsUpdate = true;
      terrainGeo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
      terrainGeo.computeVertexNormals();

      const terrainMat = new THREE.MeshLambertMaterial({ vertexColors: true, flatShading: true });
      const terrain = new THREE.Mesh(terrainGeo, terrainMat);
      sScene.add(terrain);

      sScene.add(new THREE.AmbientLight('#404060', 0.6));
      const sunDir = new THREE.DirectionalLight('#ffe0b0', 1.2);
      sunDir.position.set(50, 30, 20);
      sScene.add(sunDir);
      const fillDir = new THREE.DirectionalLight('#8090ff', 0.3);
      fillDir.position.set(-30, 20, -40);
      sScene.add(fillDir);

      const skyColor = accent.clone().multiplyScalar(0.3);
      sScene.background = skyColor;
      sScene.fog = new THREE.FogExp2(skyColor, 0.012);

      const player = new THREE.Group();
      const bodyMat = new THREE.MeshLambertMaterial({ color: '#3a6a9a', flatShading: true });
      const skinMat = new THREE.MeshLambertMaterial({ color: '#d4a574', flatShading: true });
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 6), bodyMat);
      body.position.y = 0.6;
      player.add(body);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 6, 6), skinMat);
      head.position.y = 1.35;
      player.add(head);
      [-1, 1].forEach(side => {
        const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.7, 4), skinMat);
        arm.position.set(side * 0.5, 1.0, 0);
        player.add(arm);
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.6, 4), bodyMat);
        leg.position.set(side * 0.2, 0.3, 0);
        player.add(leg);
      });

      const startH = terrainHeight(0, 0, seed) + 1.4;
      player.position.set(0, startH, 0);
      sScene.add(player);

      const aspect = window.innerWidth / window.innerHeight;
      const viewSize = 20;
      const cameraIso = new THREE.OrthographicCamera(
        -viewSize * aspect, viewSize * aspect, viewSize, -viewSize, 0.1, 100
      );
      cameraIso.position.set(15, 15, 15);
      cameraIso.lookAt(0, 0, 0);

      const cameraThird = new THREE.PerspectiveCamera(50, aspect, 0.1, 100);
      cameraThird.position.set(0, 5, 10);
      cameraThird.lookAt(0, 0, 0);

      return { scene: sScene, terrain, player, cameraIso, cameraThird };
    }

    function buildAndEnterSurface(planetName) {
      const result = buildSurfaceScene(planetName);
      surfaceState.scene = result.scene;
      surfaceState.player = result.player;
      surfaceState.cameraIso = result.cameraIso;
      surfaceState.cameraThird = result.cameraThird;
      surfaceState.activeCam = result.cameraIso;
      surfaceState.terrain = result.terrain;
      surfaceState.seed = planetName.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      surfaceState.playerDir = 0;
      surfaceState.zoom = 1;
      surfaceState.active = true;

      document.getElementById('back-to-space').style.display = 'block';
      document.getElementById('controls-hint').innerHTML = 'Arrows · Move<br>Mouse · Aim<br>V · Toggle Cam<br>ESC · Back to Space';
      document.getElementById('mode-display').textContent = planetName.toUpperCase();
      document.getElementById('scene-fade').classList.remove('active');
    }

    function returnToSolar() {
      const fade = document.getElementById('scene-fade');
      fade.classList.add('active');
      setTimeout(() => {
        if (surfaceState.scene) {
          surfaceState.scene.traverse(obj => {
            if (obj.isMesh) {
              if (obj.geometry) obj.geometry.dispose();
              if (obj.material) {
                if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                else obj.material.dispose();
              }
            }
          });
          surfaceState.scene = null;
        }
        surfaceState.active = false;
        state.mode = 'free-roam';
        state.lockedPlanet = null;
        controls.enabled = true;
        controls.target.set(0, 0, 0);
        document.getElementById('controls-hint').innerHTML = 'Drag · Rotate Camera<br>Scroll · Zoom<br>Click Planet · Lock On';
        document.getElementById('crosshair').classList.remove('visible');
        document.getElementById('mode-display').textContent = 'FREE ROAM';
        document.getElementById('back-to-space').style.display = 'none';
        fade.classList.remove('active');
      }, 400);
    }

    function updateSurface(t, dt) {
      const keys = surfaceState.keys;
      const player = surfaceState.player;
      if (!player) return;
      const seed = surfaceState.seed;

      let mx = 0, mz = 0;
      const speed = 12 * dt;

      if (surfaceState.camMode === 'isometric') {
        if (keys['ArrowUp'] || keys['KeyW']) { mx -= 0.707; mz -= 0.707; }
        if (keys['ArrowDown'] || keys['KeyS']) { mx += 0.707; mz += 0.707; }
        if (keys['ArrowLeft'] || keys['KeyA']) { mx -= 0.707; mz += 0.707; }
        if (keys['ArrowRight'] || keys['KeyD']) { mx += 0.707; mz -= 0.707; }
      } else {
        const dir = surfaceState.playerDir;
        if (keys['ArrowUp'] || keys['KeyW']) { mx -= Math.sin(dir); mz -= Math.cos(dir); }
        if (keys['ArrowDown'] || keys['KeyS']) { mx += Math.sin(dir); mz += Math.cos(dir); }
        if (keys['ArrowLeft'] || keys['KeyA']) { mx -= Math.cos(dir); mz += Math.sin(dir); }
        if (keys['ArrowRight'] || keys['KeyD']) { mx += Math.cos(dir); mz -= Math.sin(dir); }
      }

      const len = Math.sqrt(mx * mx + mz * mz);
      if (len > 0) {
        mx = mx / len * speed;
        mz = mz / len * speed;
        player.position.x += mx;
        player.position.z += mz;
        player.position.x = Math.max(-38, Math.min(38, player.position.x));
        player.position.z = Math.max(-38, Math.min(38, player.position.z));
      }

      const h = terrainHeight(player.position.x, player.position.z, seed);
      player.position.y = h + 1.4;
      player.rotation.y = surfaceState.playerDir;

      const ppos = player.position.clone();
      ppos.y += 1.0;

      if (surfaceState.camMode === 'isometric') {
        const zoom = surfaceState.zoom;
        const d = 15 / zoom;
        const aspect = window.innerWidth / window.innerHeight;
        const vs = 20 / zoom;
        surfaceState.cameraIso.left = -vs * aspect;
        surfaceState.cameraIso.right = vs * aspect;
        surfaceState.cameraIso.top = vs;
        surfaceState.cameraIso.bottom = -vs;
        surfaceState.cameraIso.updateProjectionMatrix();
        surfaceState.cameraIso.position.set(ppos.x + d, ppos.y + d, ppos.z + d);
        surfaceState.cameraIso.lookAt(ppos);
      } else {
        const zoom = surfaceState.zoom;
        const dist = Math.max(4, 12 / zoom);
        const dir = surfaceState.playerDir;
        const cx = ppos.x - Math.sin(dir) * dist;
        const cz = ppos.z - Math.cos(dir) * dist;
        surfaceState.cameraThird.position.lerp(new THREE.Vector3(cx, ppos.y + 4, cz), 0.1);
        surfaceState.cameraThird.lookAt(ppos);
      }
    }

    document.getElementById('back-to-space').addEventListener('click', returnToSolar);

    // ─────────────────────────────────────────────
    // CLOCK + RENDER LOOP
    // ─────────────────────────────────────────────
    const clock = new THREE.Clock();

    // Camera interpolation
    const camTarget   = new THREE.Vector3();
    const camOffset   = new THREE.Vector3();

    function animate() {
      requestAnimationFrame(animate);
      const t   = clock.getElapsedTime();
      const dt  = clock.getDelta ? 0.016 : 0.016;

      if (surfaceState.active) {
        updateSurface(t, dt);
        const pp = surfaceState.player.position;
        document.getElementById('cam-x').textContent = `X: ${pp.x.toFixed(1)}`;
        document.getElementById('cam-y').textContent = `Y: ${pp.z.toFixed(1)}`;
        document.getElementById('cam-z').textContent = `H: ${(pp.y - 1.4).toFixed(1)}`;
        renderer.render(surfaceState.scene, surfaceState.activeCam);
        return;
      }

      // Rotate starfield very slowly
      starfield.rotation.y = t * 0.00015;

      // ── Sun shader time uniform
      sunObjects.sunMat.uniforms.uTime.value = t;

      // ── Corona pulse (gentle sine)
      const pulse = 1.0 + 0.045 * Math.sin(t * 1.8);
      sunObjects.coronaMesh.scale.setScalar(pulse);
      sunObjects.haloMesh.scale.setScalar(1.0 + 0.07 * Math.sin(t * 1.1 + 0.5));

      // ── Lens flares: keep at origin, breathe opacity slightly
      sunObjects.flareSprites.forEach(({ sprite, opacity }, idx) => {
        sprite.position.set(0, 0, 0);
        const breathe = opacity * (0.85 + 0.15 * Math.sin(t * 0.9 + idx * 1.3));
        sprite.material.opacity = breathe;
      });

      // Orbit + spin planets
      planets.forEach(p => {
        const ud = p.userData;
        ud.angle += ud.speed * 0.001;
        p.position.x = Math.cos(ud.angle) * ud.orbitR;
        p.position.z = Math.sin(ud.angle) * ud.orbitR;
        // self-rotation around local Y (tilted by rotation.z set at build time)
        p.rotateOnAxis(new THREE.Vector3(0,1,0), 0.004);
      });

      // ── Hover detection ───────────────────────
      raycaster.setFromCamera(mousePosRaw, camera);
      const hoverHits = raycaster.intersectObjects(planets);
      const nowHovered = hoverHits.length > 0 ? hoverHits[0].object : null;

      if (nowHovered !== hoveredPlanet) {
        if (hoveredPlanet) {
          hoveredPlanet.userData.hoverRing.visible = false;
          hoveredPlanet.userData.hoverRing.material.opacity = 0;
          renderer.domElement.style.cursor = 'default';
        }
        if (nowHovered) {
          nowHovered.userData.hoverRing.visible = true;
          renderer.domElement.style.cursor = 'pointer';
        }
        hoveredPlanet = nowHovered;
      }
      // Pulse the hover ring opacity
      if (hoveredPlanet && hoveredPlanet.userData.hoverRing) {
        hoveredPlanet.userData.hoverRing.material.opacity = 0.5 + 0.35 * Math.sin(t * 4);
      }

      // ── Project planet labels to screen ───────
      const tmpVec = new THREE.Vector3();
      planets.forEach(p => {
        const lel = labelEls[p.userData.name];
        if (!lel) return;
        tmpVec.copy(p.position);
        tmpVec.project(camera);
        const sx = ( tmpVec.x * 0.5 + 0.5) * window.innerWidth;
        const sy = (-tmpVec.y * 0.5 + 0.5) * window.innerHeight;
        // offset label below the planet
        const screenR = (p.userData.radius / tmpVec.z) * 0; // just use fixed offset
        lel.style.left = sx + 'px';
        lel.style.top  = (sy + p.userData.radius * 14 / Math.abs(camera.position.distanceTo(p.position)) * 80 + 12) + 'px';
        // fade when behind camera
        lel.style.opacity = tmpVec.z > 1 ? '0' : (state.mode === 'locked' && state.lockedPlanet === p ? '0.9' : '0.45');
      });

      // Camera locked-on tracking
      if (state.mode === 'locked' && state.lockedPlanet) {
        const target = state.lockedPlanet.position;
        const radius = state.lockedPlanet.userData.orbitR;
        const dist = Math.max(state.lockedPlanet.userData.radius * 5, 24);

        // Orbit the camera around the locked planet
        const camAngle = t * 0.15;
        camOffset.set(
          target.x + Math.cos(camAngle) * dist,
          target.y + dist * 0.4,
          target.z + Math.sin(camAngle) * dist
        );

        camera.position.lerp(camOffset, 0.04);
        camTarget.lerp(target, 0.06);
        camera.lookAt(camTarget);
      } else {
        controls.update();
      }

      // Update coords display
      document.getElementById('cam-x').textContent = `X: ${camera.position.x.toFixed(1)}`;
      document.getElementById('cam-y').textContent = `Y: ${camera.position.y.toFixed(1)}`;
      document.getElementById('cam-z').textContent = `Z: ${camera.position.z.toFixed(1)}`;

      renderer.render(scene, camera);
    }

    animate();

    // ─────────────────────────────────────────────
    // RESIZE HANDLER
    // ─────────────────────────────────────────────
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      if (surfaceState.cameraIso) {
        const aspect = w / h;
        const vs = 20 / surfaceState.zoom;
        surfaceState.cameraIso.left = -vs * aspect;
        surfaceState.cameraIso.right = vs * aspect;
        surfaceState.cameraIso.top = vs;
        surfaceState.cameraIso.bottom = -vs;
        surfaceState.cameraIso.updateProjectionMatrix();
      }
      if (surfaceState.cameraThird) {
        surfaceState.cameraThird.aspect = w / h;
        surfaceState.cameraThird.updateProjectionMatrix();
      }
    });

    // ─────────────────────────────────────────────
    // DISMISS LOADING
    // ─────────────────────────────────────────────
    setTimeout(() => {
      const loading = document.getElementById('loading');
      loading.classList.add('fade-out');
      setTimeout(() => loading.style.display = 'none', 1000);
    }, 1400);
  </script>
</body>
