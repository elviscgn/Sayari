<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planet Surface</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'SF Mono', 'SFMono-Regular', 'Fira Code', 'Consolas', 'Courier New', monospace; color: #fff; }
    #canvas-container { position: fixed; inset: 0; }
    canvas { display: block; width: 100% !important; height: 100% !important; }

    #hud { position: fixed; top: 0; left: 0; right: 0; pointer-events: none; z-index: 10; }
    #hud-top { display: flex; justify-content: space-between; align-items: flex-start; padding: 24px 32px; }
    #title-block h1 { font-size: 14px; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(200, 220, 255, 0.6); font-weight: 700; }
    #title-block .sub { font-size: 11px; letter-spacing: 0.2em; color: rgba(200, 220, 255, 0.3); margin-top: 4px; font-weight: 600; }
    #status-block .mode-label { font-size: 11px; letter-spacing: 0.3em; color: rgba(255, 200, 100, 0.5); text-transform: uppercase; font-weight: 600; }
    #status-block .mode-value { font-size: 16px; letter-spacing: 0.15em; color: rgba(255, 220, 140, 0.9); margin-top: 2px; font-weight: 700; }

    #back-to-space {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 15;
      padding: 8px 20px; background: rgba(10, 10, 26, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1); color: rgba(200, 220, 255, 0.6);
      font-family: 'SF Mono', 'SFMono-Regular', 'Fira Code', 'Consolas', 'Courier New', monospace; font-size: 11px; letter-spacing: 0.25em; font-weight: 600;
      cursor: pointer; text-transform: uppercase; backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); transition: background 0.2s; pointer-events: auto;
    }
    #back-to-space:hover { background: rgba(30, 30, 60, 0.9); color: rgba(255, 255, 255, 0.9); }

    #info-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px 32px; display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none; z-index: 10; }
    #controls-hint { font-size: 12px; letter-spacing: 0.2em; color: rgba(150, 180, 255, 0.35); text-transform: uppercase; line-height: 1.8; font-weight: 600; }
    #coords { font-size: 12px; letter-spacing: 0.15em; color: rgba(150, 180, 255, 0.3); text-align: right; line-height: 1.8; font-weight: 600; }

    #loading { position: fixed; inset: 0; background: #000010; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.8s ease; }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #hotbar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 25; display: flex; gap: 4px;
    }
    .hb-btn {
      padding: 10px 18px; min-width: 72px;
      background: rgba(10, 10, 26, 0.75);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(200, 220, 255, 0.5); cursor: pointer;
      font-family: 'SF Mono', 'SFMono-Regular', 'Fira Code', 'Consolas', 'Courier New', monospace; font-size: 10px; letter-spacing: 0.15em; font-weight: 600;
      text-transform: uppercase; text-align: center; line-height: 1.3;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .hb-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: rgba(200, 220, 255, 0.8); }
    .hb-btn.active { border-color: rgba(200, 220, 255, 0.35); color: #fff; background: rgba(200, 220, 255, 0.08); }
    .hb-btn .key { font-size: 9px; color: rgba(150, 180, 255, 0.3); display: block; margin-bottom: 3px; font-weight: 700; }
    .hb-btn .swatch { display: inline-block; width: 8px; height: 8px; margin-right: 5px; border-radius: 1px; vertical-align: middle; }

    #action-panel {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      z-index: 30; display: none;
      background: rgba(10, 10, 26, 0.88);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 18px 24px 16px;
      font-family: 'SF Mono', 'SFMono-Regular', 'Fira Code', 'Consolas', 'Courier New', monospace;
      min-width: 300px;
    }
    #action-panel.open { display: block; }
    #action-title { font-size: 12px; letter-spacing: 0.35em; color: rgba(200,220,255,0.55); text-transform: uppercase; margin-bottom: 14px; text-align: center; font-weight: 700; }
    .action-row { display: flex; gap: 8px; justify-content: center; }
    .action-btn {
      padding: 9px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      color: rgba(200, 220, 255, 0.6); cursor: pointer;
      font-family: 'SF Mono', 'SFMono-Regular', 'Fira Code', 'Consolas', 'Courier New', monospace; font-size: 10px; letter-spacing: 0.2em; font-weight: 600;
      text-transform: uppercase; transition: background 0.12s, color 0.12s;
    }
    .action-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
    .action-btn:disabled { opacity: 0.3; cursor: default; color: rgba(150, 180, 255, 0.25); }
    #action-hp-wrap { margin-bottom: 10px; }
    #action-hp-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    #action-hp-fill { height: 100%; width: 100%; background: #44cc88; transition: width 0.3s; border-radius: 2px; }
    #action-hp-label { font-size: 10px; letter-spacing: 0.2em; color: rgba(200,220,255,0.35); text-align: center; margin-top: 5px; font-weight: 600; }
    #action-tier-line { font-size: 10px; letter-spacing: 0.2em; color: rgba(200,220,255,0.3); text-align: center; margin-bottom: 12px; font-weight: 600; }
  </style>
</head>
<body>

  <div id="loading">
    <div style="font-size:14px;letter-spacing:0.5em;color:rgba(200,220,255,0.5);text-transform:uppercase;margin-bottom:32px;font-weight:700;">Generating Terrain</div>
    <div style="font-size:12px;letter-spacing:0.3em;color:rgba(150,180,255,0.35);text-transform:uppercase;font-weight:600;" id="loading-name"></div>
  </div>

  <div id="canvas-container"></div>

  <div id="hud">
    <div id="hud-top">
      <div id="title-block">
        <h1 id="planet-name-display">Planet</h1>
        <div class="sub" id="planet-type-display">Surface</div>
      </div>
      <div id="status-block">
        <div class="mode-label">Camera</div>
        <div class="mode-value" id="mode-display">ISOMETRIC</div>
      </div>
    </div>
  </div>

  <button id="back-to-space">Back to Space</button>

  <div id="action-panel">
    <div id="action-title"></div>
    <div id="action-tier-line"></div>
    <div id="action-hp-wrap">
      <div id="action-hp-bar"><div id="action-hp-fill"></div></div>
      <div id="action-hp-label">HP 100/100</div>
    </div>
    <div class="action-row">
      <button class="action-btn" id="action-upgrade" disabled>Upgrade —</button>
      <button class="action-btn" id="action-rotate">Rotate</button>
      <button class="action-btn" id="action-dismantle">Dismantle</button>
      <button class="action-btn" id="action-repair">Repair</button>
    </div>
  </div>

  <div id="hotbar"></div>

  <div id="info-bar">
    <div id="controls-hint">
      Arrows · Move<br>
      Mouse · Aim<br>
      <span id="hint-keys">1-5</span> · Select building<br>
      Click · Place<br>
      R · Rotate<br>
      Right Click · Deselect<br>
      V · Toggle Cam<br>
      ESC · Back to Space
    </div>
    <div id="coords">
      <span id="pos-x">X: 0</span><br>
      <span id="pos-z">Z: 0</span><br>
      <span id="pos-cell">Cell: 0, 0</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

  <script>
    // ── PLANET DATA ─────────────────────────────
    const PLANET_COLORS = {
      Mercury: { base: '#8c8680', high: '#c8b8a0', sky: [40, 37, 32] },
      Venus:   { base: '#d4a855', high: '#e8c97a', sky: [90, 64, 32] },
      Earth:   { base: '#3a8a3a', high: '#6aaa50', sky: [79, 163, 224] },
      Mars:    { base: '#9c3a1a', high: '#c06030', sky: [193, 68, 14] },
      Jupiter: { base: '#c8955a', high: '#d4a060', sky: [96, 64, 32] },
      Saturn:  { base: '#c8b080', high: '#d4c090', sky: [80, 64, 48] },
      Uranus:  { base: '#6acccc', high: '#7de8d8', sky: [32, 128, 128] },
      Neptune: { base: '#2244dd', high: '#4466ee', sky: [26, 42, 128] },
    };

    const params = new URLSearchParams(window.location.search);
    const PLANET_NAME = params.get('planet') || 'Earth';
    const PLANET_DATA = PLANET_COLORS[PLANET_NAME] || PLANET_COLORS.Earth;
    const SEED = PLANET_NAME.split('').reduce((a, c) => a + c.charCodeAt(0), 0);

    document.getElementById('planet-name-display').textContent = PLANET_NAME.toUpperCase();
    document.getElementById('loading-name').textContent = PLANET_NAME;

    // ── CONSTANTS ────────────────────────────────
    const TS = 600;
    const CELL = 15;
    const CELLS = TS / CELL;
    const HALF = TS / 2;

    // ── NOISE (for ground color variation only) ──
    function hash2D(x, z, seed) {
      let h = seed + x * 374761393 + z * 668265263;
      h = (h ^ (h >> 13)) * 1274126177;
      return ((h ^ (h >> 16)) & 0x7FFFFFFF) / 2147483647;
    }

    function fbm1D(x, seed) {
      const ix = Math.floor(x);
      const fx = x - ix;
      const sx = fx * fx * (3 - 2 * fx);
      const v0 = hash2D(ix, 0, seed);
      const v1 = hash2D(ix + 1, 0, seed);
      return v0 + (v1 - v0) * sx;
    }

    // ── SCENE ────────────────────────────────────
    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const aspect = window.innerWidth / window.innerHeight;
    const camera = new THREE.PerspectiveCamera(50, aspect, 0.5, 500);

    // ── GROUND TEXTURE (procedural canvas) ──────
    function buildGroundTexture() {
      const S = 512;
      const c = document.createElement('canvas');
      c.width = c.height = S;
      const ctx = c.getContext('2d');

      const baseColor = new THREE.Color(PLANET_DATA.base);
      const r = Math.round(baseColor.r * 255);
      const g = Math.round(baseColor.g * 255);
      const b = Math.round(baseColor.b * 255);

      ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
      ctx.fillRect(0, 0, S, S);

      const rng = (() => { let s = SEED + 42; return () => { s = (s * 1664525 + 1013904223) | 0; return (s >>> 0) / 4294967296; }; })();

      for (let i = 0; i < 300; i++) {
        const x = rng() * S, y = rng() * S, rad = 5 + rng() * 25;
        const bright = rng() * 0.15 + 0.85;
        const dr = Math.round(r * (1 - bright)), dg = Math.round(g * (1 - bright)), db = Math.round(b * (1 - bright));
        const grad = ctx.createRadialGradient(x, y, 0, x, y, rad);
        grad.addColorStop(0, `rgba(${r + dr}, ${g + dg}, ${b + db}, 0.25)`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, S, S);
      }

      for (let i = 0; i < 800; i++) {
        const x = rng() * S, y = rng() * S;
        ctx.fillStyle = `rgba(0,0,0,${0.02 + rng() * 0.06})`;
        ctx.fillRect(x, y, 1 + rng() * 2, 1);
      }

      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(30, 30);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return tex;
    }

    // ── TERRAIN (flat ground, textured) ──────────
    function buildTerrain() {
      const geo = new THREE.PlaneGeometry(TS, TS, 1, 1);
      geo.rotateX(-Math.PI / 2);

      const mat = new THREE.MeshLambertMaterial({
        map: buildGroundTexture(),
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.receiveShadow = true;
      scene.add(mesh);
      return mesh;
    }

    const terrain = buildTerrain();

    // ── LIGHTS ───────────────────────────────────
    scene.add(new THREE.AmbientLight('#404060', 0.35));
    const hemi = new THREE.HemisphereLight(
      new THREE.Color(PLANET_DATA.sky[0]/255, PLANET_DATA.sky[1]/255, PLANET_DATA.sky[2]/255),
      0x202020, 0.6
    );
    scene.add(hemi);

    const sun = new THREE.DirectionalLight('#ffe0b0', 1.4);
    sun.position.set(80, 100, 40);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 250;
    sun.shadow.camera.left = -80;
    sun.shadow.camera.right = 80;
    sun.shadow.camera.top = 80;
    sun.shadow.camera.bottom = -80;
    scene.add(sun);

    const fill = new THREE.DirectionalLight('#8090ff', 0.3);
    fill.position.set(-40, 30, -60);
    scene.add(fill);

    // ── SKY / FOG ────────────────────────────────
    const skyColor = new THREE.Color(
      PLANET_DATA.sky[0] / 255, PLANET_DATA.sky[1] / 255, PLANET_DATA.sky[2] / 255
    );
    scene.background = skyColor;
    scene.fog = new THREE.FogExp2(skyColor.clone().multiplyScalar(0.5), 0.002);

    // ── GRID ─────────────────────────────────────
    function buildGrid() {
      const pos = [];
      for (let i = 0; i <= CELLS; i++) {
        const p = -HALF + i * CELL;
        pos.push(-HALF, 0.05, p, HALF, 0.05, p);
        pos.push(p, 0.05, -HALF, p, 0.05, HALF);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
      const mat = new THREE.LineBasicMaterial({
        color: '#ffffff', transparent: true, opacity: 0.85, depthWrite: false, depthTest: false,
      });
      const grid = new THREE.LineSegments(geo, mat);
      scene.add(grid);
      return grid;
    }
    buildGrid();

    // ── CELL HOVER ───────────────────────────────
    const hoverMat = new THREE.MeshBasicMaterial({
      color: '#ffffff', transparent: true, opacity: 0.2, side: THREE.DoubleSide,
      depthWrite: false, blending: THREE.AdditiveBlending,
    });
    const hoverMesh = new THREE.Mesh(new THREE.PlaneGeometry(CELL, CELL), hoverMat);
    hoverMesh.rotation.x = -Math.PI / 2;
    hoverMesh.position.y = 0.06;
    hoverMesh.visible = false;
    scene.add(hoverMesh);

    const outlineMat = new THREE.LineBasicMaterial({
      color: '#ffffff', transparent: true, opacity: 0.9, depthWrite: false,
    });
    const hh = CELL / 2;
    const outlinePts = [
      new THREE.Vector3(-hh, 0, -hh), new THREE.Vector3(hh, 0, -hh),
      new THREE.Vector3(hh, 0,  hh), new THREE.Vector3(-hh, 0,  hh),
      new THREE.Vector3(-hh, 0, -hh),
    ];
    const outlineGeo = new THREE.BufferGeometry().setFromPoints(outlinePts);
    const hoverOutline = new THREE.Line(outlineGeo, outlineMat);
    hoverOutline.rotation.x = -Math.PI / 2;
    hoverOutline.position.y = 0.065;
    hoverOutline.visible = false;
    scene.add(hoverOutline);

    function getCell(wx, wz) {
      const cx = Math.floor((wx + HALF) / CELL);
      const cz = Math.floor((wz + HALF) / CELL);
      return { cx: Math.max(0, Math.min(CELLS - 1, cx)), cz: Math.max(0, Math.min(CELLS - 1, cz)) };
    }

    function getCellCenter(cx, cz) {
      return { x: cx * CELL + CELL / 2 - HALF, z: cz * CELL + CELL / 2 - HALF };
    }

    let hoveredCell = null;

    // ── FOUNDATIONS ──────────────────────────────
    const foundations = [];
    const foundationTargets = [];
    const foundationMat = new THREE.MeshLambertMaterial({
      color: '#88ccff', transparent: true, opacity: 0.35, depthWrite: false,
    });
    const foundationEdgeMat = new THREE.LineBasicMaterial({
      color: '#88ccff', transparent: true, opacity: 0.6, depthWrite: false,
    });

    function placeFoundation(cx, cz) {
      if (foundations.some(f => f.cx === cx && f.cz === cz)) return;
      const pc = getCell(player.position.x, player.position.z);
      if (pc.cx === cx && pc.cz === cz) return;
      const center = getCellCenter(cx, cz);

      const mesh = new THREE.Mesh(new THREE.BoxGeometry(CELL, 0.1, CELL), foundationMat);
      mesh.position.set(center.x, 0.02, center.z);
      mesh.receiveShadow = true;
      scene.add(mesh);
      foundationTargets.push(mesh);

      const edgePts = [
        new THREE.Vector3(-hh, 0, -hh), new THREE.Vector3(hh, 0, -hh),
        new THREE.Vector3(hh, 0,  hh), new THREE.Vector3(-hh, 0,  hh),
        new THREE.Vector3(-hh, 0, -hh),
      ];
      const edgeGeo = new THREE.BufferGeometry().setFromPoints(edgePts);
      const edge = new THREE.Line(edgeGeo, foundationEdgeMat);
      edge.rotation.x = -Math.PI / 2;
      edge.position.set(center.x, 0.08, center.z);
      scene.add(edge);

      const collider = aabbFromBox(center.x, center.z, CELL / 2, CELL / 2, 0);
      foundations.push({ cx, cz, mesh, edge, building: null, buildingMesh: null, collider, tier: 0, hp: 100, maxHp: 100 });
    }

    function canPlaceAt(cx, cz) {
      if (foundations.some(f => f.cx === cx && f.cz === cz && f.building)) return false;
      const pc = getCell(player.position.x, player.position.z);
      if (pc.cx === cx && pc.cz === cz) return false;
      return true;
    }

    // ── BUILDING TYPES ───────────────────────────
    const BUILDING_TYPES = {
      wall:     { name: 'Wall',          color: 0x8a9aaa, desc: 'Perimeter barrier' },
      turret:   { name: 'Turret',        color: 0xcc4444, desc: 'Auto-targeting defense' },
      solar:    { name: 'Solar Panel',   color: 0x44aacc, desc: 'Power generation' },
      storage:  { name: 'Storage',       color: 0xccaa44, desc: 'Resource stockpile' },
      workshop: { name: 'Workshop',      color: 0xaa88cc, desc: 'Crafting station' },
    };

    const UPGRADE_TIERS = {
      wall: [
        { name: 'Wall', color: 0x8a9aaa, scale: 1.0 },
        { name: 'Reinforced Wall', color: 0x7a8a9a, scale: 1.25 },
        { name: 'Fortress Wall', color: 0x5a6a7a, scale: 1.5 },
      ],
      turret: [
        { name: 'Turret', color: 0xcc4444, scale: 1.0 },
        { name: 'Cannon', color: 0xdd5555, scale: 1.25 },
        { name: 'Artillery', color: 0xee6666, scale: 1.5 },
      ],
      solar: [
        { name: 'Solar Panel', color: 0x44aacc, scale: 1.0 },
        { name: 'Solar Array', color: 0x55bbdd, scale: 1.3 },
        { name: 'Solar Farm', color: 0x66ccee, scale: 1.6 },
      ],
      storage: [
        { name: 'Storage', color: 0xccaa44, scale: 1.0 },
        { name: 'Warehouse', color: 0xddbb55, scale: 1.3 },
        { name: 'Depot', color: 0xeecc66, scale: 1.6 },
      ],
      workshop: [
        { name: 'Workshop', color: 0xaa88cc, scale: 1.0 },
        { name: 'Lab', color: 0xbb99dd, scale: 1.25 },
        { name: 'Research Center', color: 0xccaaee, scale: 1.5 },
      ],
    };

    const PLANET_BUILDS = {
      Mercury: ['wall', 'turret', 'storage', 'workshop'],
      Venus:   ['wall', 'turret', 'solar', 'storage', 'workshop'],
      Earth:   ['wall', 'turret', 'solar', 'storage', 'workshop'],
      Mars:    ['wall', 'turret', 'storage', 'workshop'],
      Jupiter: ['wall', 'turret', 'storage'],
      Saturn:  ['wall', 'turret', 'solar', 'storage'],
      Uranus:  ['wall', 'storage', 'workshop'],
      Neptune: ['wall', 'storage', 'workshop'],
    };

    let typeKeys = PLANET_BUILDS[PLANET_NAME] || Object.keys(BUILDING_TYPES);

    // ── COLLISION ────────────────────────────────
    const buildingColliders = [];
    const PLAYER_RADIUS = 0.3;

    function aabbFromBox(cx, cz, hx, hz, ry) {
      const cos = Math.round(Math.cos(ry));
      const sin = Math.round(Math.sin(ry));
      const whx = Math.abs(hx * cos) + Math.abs(hz * sin);
      const whz = Math.abs(hx * sin) + Math.abs(hz * cos);
      return { minX: cx - whx, maxX: cx + whx, minZ: cz - whz, maxZ: cz + whz };
    }

    function collides(px, pz, r, box) {
      const cx = Math.max(box.minX, Math.min(px, box.maxX));
      const cz = Math.max(box.minZ, Math.min(pz, box.maxZ));
      const dx = px - cx, dz = pz - cz;
      return dx * dx + dz * dz < r * r;
    }

    function anyCollision(px, pz) {
      for (const f of foundations) {
        if (f.collider && collides(px, pz, PLAYER_RADIUS, f.collider)) return true;
      }
      for (const c of buildingColliders) {
        if (collides(px, pz, PLAYER_RADIUS, c)) return true;
      }
      return false;
    }

    // ── BUILDING TARGETS (for click detection) ────
    const buildingTargets = [];

    // ── HOTBAR + DIRECT PLACEMENT ────────────────
    let selectedBuilding = null;
    let buildRotation = 0;
    let placementGhost = null;

    const hotbarEl = document.getElementById('hotbar');

    document.getElementById('hint-keys').textContent = '1-' + typeKeys.length;

    function buildHotbar() {
      hotbarEl.innerHTML = '';
      typeKeys.forEach((key, i) => {
        const bt = BUILDING_TYPES[key];
        const btn = document.createElement('button');
        btn.className = 'hb-btn';
        btn.dataset.type = key;
        btn.innerHTML = `<span class="key">${i + 1}</span><span class="swatch" style="background:#${bt.color.toString(16).padStart(6,'0')}"></span>${bt.name}`;
        btn.addEventListener('click', () => selectBuilding(key));
        hotbarEl.appendChild(btn);
      });
    }
    buildHotbar();

    function selectBuilding(key) {
      if (selectedBuilding === key) { deselectBuilding(); return; }
      selectedBuilding = key;
      buildRotation = 0;
      document.querySelectorAll('.hb-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.type === key)
      );
    }

    function deselectBuilding() {
      selectedBuilding = null;
      buildRotation = 0;
      document.querySelectorAll('.hb-btn').forEach(b => b.classList.remove('active'));
      if (placementGhost) {
        placementGhost.forEach(m => scene.remove(m));
        placementGhost = null;
      }
    }

    function rotateBuilding() {
      if (!selectedBuilding) return;
      buildRotation = (buildRotation + 1) % 4;
      if (hoveredCell) updateGhost(hoveredCell.cx, hoveredCell.cz);
    }

    function makeBuildingMesh(typeKey, color, transparent, opacity, scale) {
      const s = scale || 1;
      const mat = new THREE.MeshLambertMaterial({ color, transparent, opacity });
      let meshes = [];

      if (typeKey === 'wall') {
        const m = new THREE.Mesh(new THREE.BoxGeometry((CELL - 0.2) * s, 3.0 * s, (CELL - 0.2) * s), mat);
        m.position.set(0, 1.5 * s, 0);
        meshes.push(m);
      } else if (typeKey === 'turret') {
        const base = new THREE.Mesh(new THREE.CylinderGeometry(2 * s, 2.5 * s, 0.3 * s, 8), mat);
        base.position.set(0, 0.15 * s, 0);
        meshes.push(base);
        const topMat = new THREE.MeshLambertMaterial({ color: 0xdd6666, transparent, opacity });
        const top = new THREE.Mesh(new THREE.BoxGeometry(0.8 * s, 0.6 * s, 0.8 * s), topMat);
        top.position.set(0, 0.6 * s, 0);
        meshes.push(top);
      } else if (typeKey === 'solar') {
        const m = new THREE.Mesh(new THREE.BoxGeometry((CELL - 1) * s, 0.1 * s, CELL * 0.6 * s), mat);
        m.position.set(0, 0.05 * s, 0);
        m.rotation.z = 0.3;
        meshes.push(m);
      } else {
        const m = new THREE.Mesh(new THREE.BoxGeometry((CELL - 1) * s, 1.0 * s, (CELL - 1) * s), mat);
        m.position.set(0, 0.5 * s, 0);
        meshes.push(m);
      }

      meshes.forEach(m => { m.castShadow = true; m.receiveShadow = true; });
      return meshes;
    }

    function updateGhost(cx, cz) {
      if (placementGhost) {
        placementGhost.forEach(m => scene.remove(m));
        placementGhost = null;
      }
      if (!selectedBuilding) return;
      const valid = canPlaceAt(cx, cz);
      const color = valid ? 0x44ff88 : 0xff4444;
      placementGhost = makeBuildingMesh(selectedBuilding, color, true, valid ? 0.3 : 0.4);
      const center = getCellCenter(cx, cz);
      placementGhost.forEach(m => {
        m.position.x += center.x;
        m.position.z += center.z;
        if (buildRotation !== 0) {
          const ox = m.position.x - center.x;
          const oz = m.position.z - center.z;
          const r = buildRotation * Math.PI / 2;
          const nx = ox * Math.cos(r) - oz * Math.sin(r);
          const nz = ox * Math.sin(r) + oz * Math.cos(r);
          m.position.x = center.x + nx;
          m.position.z = center.z + nz;
          m.rotation.y += r;
        }
        scene.add(m);
      });
    }

    function getBuildingAABBs(cx, cz, typeKey, rotation) {
      const ry = rotation * Math.PI / 2;
      const halfCell = (CELL - 1) / 2;
      if (typeKey === 'wall') return [aabbFromBox(cx, cz, (CELL - 0.2) / 2, (CELL - 0.2) / 2, 0)];
      if (typeKey === 'turret') return [
        aabbFromBox(cx, cz, 2.5, 2.5, 0),
        aabbFromBox(cx, cz, 0.4, 0.4, ry),
      ];
      if (typeKey === 'solar') return [aabbFromBox(cx, cz, halfCell, CELL * 0.3, ry)];
      return [aabbFromBox(cx, cz, halfCell, halfCell, ry)];
    }

    function placeBuilding(cx, cz, typeKey, rotation) {
      if (foundations.some(f => f.cx === cx && f.cz === cz && f.building)) return;
      const pc = getCell(player.position.x, player.position.z);
      if (pc.cx === cx && pc.cz === cz) return;

      let entry = foundations.find(f => f.cx === cx && f.cz === cz);
      if (entry) {
        if (entry.building) return;
        // Upgrade existing foundation
        scene.remove(entry.mesh);
        scene.remove(entry.edge);
        const mi = foundationTargets.indexOf(entry.mesh);
        if (mi !== -1) foundationTargets.splice(mi, 1);
        entry.collider = null;
      } else {
        // Auto-place foundation under building
        placeFoundation(cx, cz);
        entry = foundations[foundations.length - 1];
        // Remove the foundation collider since building replaces it
        entry.collider = null;
      }

      const tiers = UPGRADE_TIERS[typeKey];
      const tier = 0;
      const tDef = tiers ? tiers[tier] : null;
      const tColor = tDef ? tDef.color : BUILDING_TYPES[typeKey].color;
      const tScale = tDef ? tDef.scale : 1;
      const center = getCellCenter(cx, cz);
      const meshes = makeBuildingMesh(typeKey, tColor, false, 1, tScale);
      meshes.forEach(m => {
        m.position.x += center.x;
        m.position.z += center.z;
        if (rotation !== 0) {
          const ox = m.position.x - center.x;
          const oz = m.position.z - center.z;
          const r = rotation * Math.PI / 2;
          const nx = ox * Math.cos(r) - oz * Math.sin(r);
          const nz = ox * Math.sin(r) + oz * Math.cos(r);
          m.position.x = center.x + nx;
          m.position.z = center.z + nz;
          m.rotation.y += r;
        }
        scene.add(m);
      });

      const aabbs = getBuildingAABBs(center.x, center.z, typeKey, rotation);
      aabbs.forEach(a => buildingColliders.push(a));

      meshes.forEach(m => buildingTargets.push(m));

      entry.building = typeKey;
      entry.rotation = rotation;
      entry.buildingMeshes = meshes;
      entry.colliderAABBs = aabbs;
      entry.tier = 0;
      entry.hp = 100;
      entry.maxHp = 100;
      saveBuildings();
    }

    // ── ACTION PANEL ─────────────────────────────
    let actionTarget = null;
    const actionPanelEl = document.getElementById('action-panel');
    const actionTitleEl = document.getElementById('action-title');
    const actionTierEl = document.getElementById('action-tier-line');
    const actionHpFillEl = document.getElementById('action-hp-fill');
    const actionHpLabelEl = document.getElementById('action-hp-label');
    const actionUpgradeEl = document.getElementById('action-upgrade');
    const actionRotateEl = document.getElementById('action-rotate');
    const actionDismantleEl = document.getElementById('action-dismantle');
    const actionRepairEl = document.getElementById('action-repair');

    function openActionPanel(entry) {
      if (selectedBuilding) deselectBuilding();
      actionTarget = entry;
      const tiers = entry.building ? UPGRADE_TIERS[entry.building] : null;
      const tier = entry.tier || 0;
      const tDef = tiers ? tiers[tier] : null;
      const name = tDef ? tDef.name : (entry.building ? BUILDING_TYPES[entry.building]?.name || entry.building : 'Foundation');
      actionTitleEl.textContent = name.toUpperCase();
      actionTierEl.textContent = tiers ? `Tier ${tier + 1} / ${tiers.length}` : '';
      const hp = entry.hp || 0;
      const maxHp = entry.maxHp || 100;
      const pct = Math.max(0, Math.min(100, (hp / maxHp) * 100));
      actionHpFillEl.style.width = pct + '%';
      actionHpFillEl.style.background = pct > 60 ? '#44cc88' : pct > 30 ? '#ccaa44' : '#cc4444';
      actionHpLabelEl.textContent = `HP ${Math.round(hp)}/${maxHp}`;
      const nextTier = tiers ? tiers[tier + 1] : null;
      if (nextTier) {
        actionUpgradeEl.disabled = false;
        actionUpgradeEl.textContent = `Upgrade ${nextTier.name}`;
      } else {
        actionUpgradeEl.disabled = true;
        actionUpgradeEl.textContent = entry.building ? 'Max Tier' : 'Upgrade —';
      }
      actionRepairEl.disabled = hp >= maxHp;
      actionPanelEl.classList.add('open');
    }

    function closeActionPanel() {
      actionTarget = null;
      actionPanelEl.classList.remove('open');
    }

    actionRotateEl.addEventListener('click', () => {
      if (!actionTarget || !actionTarget.building) return;
      const r = ((actionTarget.rotation || 0) + 1) % 4;
      const center = getCellCenter(actionTarget.cx, actionTarget.cz);
      (actionTarget.buildingMeshes || []).forEach(m => {
        const ox = m.position.x - center.x;
        const oz = m.position.z - center.z;
        const nx = ox * Math.cos(Math.PI / 2) - oz * Math.sin(Math.PI / 2);
        const nz = ox * Math.sin(Math.PI / 2) + oz * Math.cos(Math.PI / 2);
        m.position.x = center.x + nx;
        m.position.z = center.z + nz;
        m.rotation.y += Math.PI / 2;
      });
      (actionTarget.colliderAABBs || []).forEach(a => {
        const ci = buildingColliders.indexOf(a);
        if (ci !== -1) buildingColliders.splice(ci, 1);
      });
      actionTarget.rotation = r;
      const newAABBs = getBuildingAABBs(center.x, center.z, actionTarget.building, r);
      newAABBs.forEach(a => buildingColliders.push(a));
      actionTarget.colliderAABBs = newAABBs;
    });

    actionUpgradeEl.addEventListener('click', () => {
      if (!actionTarget || !actionTarget.building) return;
      const entry = actionTarget;
      const tiers = UPGRADE_TIERS[entry.building];
      if (!tiers || entry.tier >= tiers.length - 1) return;
      const nextTier = entry.tier + 1;
      const tDef = tiers[nextTier];
      (entry.buildingMeshes || []).forEach(m => {
        scene.remove(m);
        const mi = buildingTargets.indexOf(m);
        if (mi !== -1) buildingTargets.splice(mi, 1);
      });
      const center = getCellCenter(entry.cx, entry.cz);
      const meshes = makeBuildingMesh(entry.building, tDef.color, false, 1, tDef.scale);
      meshes.forEach(m => {
        m.position.x += center.x;
        m.position.z += center.z;
        if (entry.rotation) {
          const ox = m.position.x - center.x;
          const oz = m.position.z - center.z;
          const r = entry.rotation * Math.PI / 2;
          m.position.x = center.x + ox * Math.cos(r) - oz * Math.sin(r);
          m.position.z = center.z + ox * Math.sin(r) + oz * Math.cos(r);
          m.rotation.y += r;
        }
        scene.add(m);
      });
      entry.buildingMeshes = meshes;
      meshes.forEach(m => buildingTargets.push(m));
      entry.tier = nextTier;
      openActionPanel(entry);
      saveBuildings();
    });

    actionDismantleEl.addEventListener('click', () => {
      if (!actionTarget) return;
      closeActionPanel();
      const entry = actionTarget;
      // Remove building meshes + targets
      (entry.buildingMeshes || []).forEach(m => {
        scene.remove(m);
        const mi = buildingTargets.indexOf(m);
        if (mi !== -1) buildingTargets.splice(mi, 1);
      });
      (entry.colliderAABBs || []).forEach(a => {
        const ci = buildingColliders.indexOf(a);
        if (ci !== -1) buildingColliders.splice(ci, 1);
      });
      entry.building = null;
      entry.buildingMeshes = null;
      entry.rotation = 0;
      // Restore foundation
      const center = getCellCenter(entry.cx, entry.cz);
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(CELL, 0.1, CELL), foundationMat);
      mesh.position.set(center.x, 0.02, center.z);
      mesh.receiveShadow = true;
      scene.add(mesh);
      foundationTargets.push(mesh);
      const edgePts = [
        new THREE.Vector3(-hh, 0, -hh), new THREE.Vector3(hh, 0, -hh),
        new THREE.Vector3(hh, 0,  hh), new THREE.Vector3(-hh, 0,  hh),
        new THREE.Vector3(-hh, 0, -hh),
      ];
      const edgeGeo = new THREE.BufferGeometry().setFromPoints(edgePts);
      const edge = new THREE.Line(edgeGeo, foundationEdgeMat);
      edge.rotation.x = -Math.PI / 2;
      edge.position.set(center.x, 0.08, center.z);
      scene.add(edge);
      entry.mesh = mesh;
      entry.edge = edge;
      entry.collider = aabbFromBox(center.x, center.z, CELL / 2, CELL / 2, 0);
      saveBuildings();
    });

    actionRepairEl.addEventListener('click', () => {
      if (!actionTarget || !actionTarget.building) return;
      const entry = actionTarget;
      if (entry.hp >= entry.maxHp) return;
      entry.hp = Math.min(entry.maxHp, (entry.hp || 0) + 50);
      openActionPanel(entry);
      saveBuildings();
    });

    // ── SAVE / LOAD ──────────────────────────────
    function saveBuildings() {
      const data = [];
      for (const f of foundations) {
        if (!f.building) continue;
        data.push({ cx: f.cx, cz: f.cz, building: f.building, rotation: f.rotation || 0, tier: f.tier || 0, hp: f.hp || 100 });
      }
      try { localStorage.setItem('safayi_' + PLANET_NAME, JSON.stringify(data)); } catch(e) {}
    }

    function loadBuildings() {
      let raw;
      try { raw = localStorage.getItem('safayi_' + PLANET_NAME); } catch(e) {}
      if (!raw) return;
      let data;
      try { data = JSON.parse(raw); } catch(e) {}
      if (!data) return;
      for (const d of data) {
        if (!d.building) continue;
        placeBuilding(d.cx, d.cz, d.building, d.rotation || 0);
        const entry = foundations[foundations.length - 1];
        if (entry) { entry.tier = d.tier || 0; entry.hp = d.hp || 100; }
      }
      saveBuildings();
    }

    // ── PLAYER ───────────────────────────────────
    function buildPlayer() {
      const g = new THREE.Group();
      const matBody = new THREE.MeshLambertMaterial({ color: '#2a5a8a' });
      const matSkin = new THREE.MeshLambertMaterial({ color: '#c49464' });
      const matLeg = new THREE.MeshLambertMaterial({ color: '#3a3a5a' });

      const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.35), matBody);
      torso.position.y = 0.7;
      torso.castShadow = true;
      g.add(torso);

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 6), matSkin);
      head.position.y = 1.1;
      head.castShadow = true;
      g.add(head);

      const arms = [];
      const legs = [];
      [-1, 1].forEach(s => {
        const arm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.45, 0.1), matSkin);
        arm.position.set(s * 0.4, 0.55, 0);
        arm.castShadow = true;
        arm.userData.restX = s * 0.4;
        g.add(arm);
        arms.push(arm);

        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.45, 0.12), matLeg);
        leg.position.set(s * 0.15, 0.22, 0);
        leg.castShadow = true;
        leg.userData.restX = s * 0.15;
        g.add(leg);
        legs.push(leg);
      });

      g.position.set(0, 0, 0);
      scene.add(g);

      let animTime = 0;
      let prevPos = { x: 0, z: 0 };
      let isMoving = false;

      return { group: g, arms, legs, animTime, prevPos, isMoving };
    }

    const playerObj = buildPlayer();
    const player = playerObj.group;

    // ── CAMERA STATE ─────────────────────────────
    const state = {
      mode: 'isometric',
      zoom: 1, pitch: Math.PI / 3, yaw: Math.PI / 4, dist: 40,
      playerDir: 0, keys: {},
      smoothPos: new THREE.Vector3(), smoothTarget: new THREE.Vector3(),
    };

    // ── INPUT ────────────────────────────────────
    const ray = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const intersectPoint = new THREE.Vector3();

    document.addEventListener('keydown', e => {
      state.keys[e.code] = true;
      if (e.code.startsWith('Arrow')) e.preventDefault();
      if (e.code === 'KeyV') {
        state.mode = state.mode === 'isometric' ? 'third-person' : 'isometric';
        document.getElementById('mode-display').textContent =
          state.mode.toUpperCase().replace('-', ' ');
      }
      if (e.code === 'KeyR' && selectedBuilding) {
        rotateBuilding();
      }
      if (e.code === 'Escape') {
        if (selectedBuilding) { deselectBuilding(); return; }
        if (actionTarget) { closeActionPanel(); return; }
        window.location.href = 'solar-system.html';
      }
      // Hotbar shortcuts 1-5
      const num = parseInt(e.code.replace('Digit', ''));
      if (num >= 1 && num <= typeKeys.length) selectBuilding(typeKeys[num - 1]);
    });
    document.addEventListener('keyup', e => { state.keys[e.code] = false; });

    renderer.domElement.addEventListener('mousemove', e => {
      const nx = (e.clientX / window.innerWidth) * 2 - 1;
      const ny = -(e.clientY / window.innerHeight) * 2 + 1;
      mouse.set(nx, ny);
      ray.setFromCamera(mouse, camera);

      if (ray.ray.intersectPlane(groundPlane, intersectPoint)) {
        const dx = intersectPoint.x - player.position.x;
        const dz = intersectPoint.z - player.position.z;
        state.playerDir = Math.atan2(dx, dz);

        const cell = getCell(intersectPoint.x, intersectPoint.z);
        const center = getCellCenter(cell.cx, cell.cz);
        hoverMesh.position.set(center.x, 0.06, center.z);
        hoverMesh.visible = true;
        hoverOutline.position.set(center.x, 0.065, center.z);
        hoverOutline.visible = true;
        hoveredCell = cell;
        document.getElementById('pos-cell').textContent = `Cell: ${cell.cx}, ${cell.cz}`;

        if (selectedBuilding) updateGhost(cell.cx, cell.cz);
      }
    });

    const clickRay = new THREE.Raycaster();
    const clickMouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', e => {
      if (selectedBuilding && hoveredCell) {
        placeBuilding(hoveredCell.cx, hoveredCell.cz, selectedBuilding, buildRotation);
        return;
      }

      clickMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      clickMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      clickRay.setFromCamera(clickMouse, camera);

      const buildingHits = clickRay.intersectObjects(buildingTargets);
      if (buildingHits.length > 0) {
        const hitMesh = buildingHits[0].object;
        const entry = foundations.find(f => f.buildingMeshes && f.buildingMeshes.includes(hitMesh));
        if (entry) { openActionPanel(entry); return; }
      }

      const foundationHits = clickRay.intersectObjects(foundationTargets);
      if (foundationHits.length > 0) {
        const hitMesh = foundationHits[0].object;
        const entry = foundations.find(f => f.mesh === hitMesh);
        if (entry && !entry.building) { openActionPanel(entry); return; }
      }

      if (actionTarget) closeActionPanel();
    });

    renderer.domElement.addEventListener('contextmenu', e => {
      e.preventDefault();
      if (selectedBuilding) deselectBuilding();
      else if (actionTarget) closeActionPanel();
    });

    renderer.domElement.addEventListener('wheel', e => {
      state.zoom = Math.max(0.3, Math.min(5, state.zoom + e.deltaY * 0.003));
    }, { passive: true });

    document.getElementById('back-to-space').addEventListener('click', () => {
      window.location.href = 'solar-system.html';
    });

    // ── FIXED TIMESTEP GAME LOOP ────────────────
    const FIXED_DT = 1 / 60;
    let accumulator = 0;
    let lastTime = performance.now();

    function update(dt) {
      let mx = 0, mz = 0;
      const k = state.keys;

      if (state.mode === 'isometric') {
        if (k['ArrowUp'] || k['KeyW']) { mx -= 1; mz -= 1; }
        if (k['ArrowDown'] || k['KeyS']) { mx += 1; mz += 1; }
        if (k['ArrowLeft'] || k['KeyA']) { mx -= 1; mz += 1; }
        if (k['ArrowRight'] || k['KeyD']) { mx += 1; mz -= 1; }
      } else {
        const d = state.playerDir;
        if (k['ArrowUp'] || k['KeyW']) { mx -= Math.sin(d); mz -= Math.cos(d); }
        if (k['ArrowDown'] || k['KeyS']) { mx += Math.sin(d); mz += Math.cos(d); }
        if (k['ArrowLeft'] || k['KeyA']) { mx -= Math.cos(d); mz += Math.sin(d); }
        if (k['ArrowRight'] || k['KeyD']) { mx += Math.cos(d); mz -= Math.sin(d); }
      }

      const speed = 30 * dt;
      const len2 = mx * mx + mz * mz;
      playerObj.isMoving = len2 > 0;

      if (playerObj.isMoving) {
        const inv = speed / Math.sqrt(len2);
        const limit = HALF - 3;
        const nx = player.position.x + mx * inv;
        const nz = player.position.z + mz * inv;
        // Per-axis collision against actual mesh shapes
        const px = !anyCollision(nx, player.position.z)
          ? Math.max(-limit, Math.min(limit, nx)) : player.position.x;
        const pz = !anyCollision(player.position.x, nz)
          ? Math.max(-limit, Math.min(limit, nz)) : player.position.z;
        player.position.x = px;
        player.position.z = pz;
        playerObj.animTime += dt * 8;
      } else {
        playerObj.animTime = 0;
      }

      if (playerObj.isMoving && state.mode === 'isometric') {
        state.playerDir = Math.atan2(mx, mz);
      }
      player.position.y = 0;
      player.rotation.y = state.playerDir;

      // Walking animation
      const swing = playerObj.isMoving ? Math.sin(playerObj.animTime) * 0.5 : 0;
      playerObj.arms[0].rotation.x = swing;
      playerObj.arms[1].rotation.x = -swing;
      playerObj.legs[0].rotation.x = -swing;
      playerObj.legs[1].rotation.x = swing;
      if (playerObj.isMoving) {
        const bounce = Math.abs(Math.sin(playerObj.animTime)) * 0.05;
        player.position.y += bounce;
      }

      // Camera follow
      const pp = player.position.clone();
      pp.y += 0.8;

      const z = state.zoom;
      if (state.mode === 'isometric') {
        const d = state.dist / z;
        const cx = pp.x + Math.sin(state.yaw) * Math.cos(state.pitch) * d;
        const cy = pp.y + Math.sin(state.pitch) * d;
        const cz = pp.z + Math.cos(state.yaw) * Math.cos(state.pitch) * d;
        state.smoothPos.lerp(new THREE.Vector3(cx, cy, cz), 8 * dt);
        state.smoothTarget.lerp(pp, 10 * dt);
      } else {
        const dist = Math.max(3, 10 / z);
        const dir = state.playerDir;
        const cx = pp.x - Math.sin(dir) * dist;
        const cz = pp.z - Math.cos(dir) * dist;
        state.smoothPos.lerp(new THREE.Vector3(cx, pp.y + 4, cz), 8 * dt);
        state.smoothTarget.lerp(pp, 10 * dt);
      }

      camera.position.copy(state.smoothPos);
      camera.lookAt(state.smoothTarget);

      document.getElementById('pos-x').textContent = 'X: ' + Math.round(player.position.x);
      document.getElementById('pos-z').textContent = 'Z: ' + Math.round(player.position.z);
    }

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();
      let frameTime = (now - lastTime) / 1000;
      lastTime = now;
      if (frameTime > 0.1) frameTime = 0.1;
      accumulator += frameTime;

      while (accumulator >= FIXED_DT) {
        update(FIXED_DT);
        accumulator -= FIXED_DT;
      }

      renderer.render(scene, camera);
    }

    animate();

    // ── RESIZE ───────────────────────────────────
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    // ── DISMISS LOADING ──────────────────────────
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
      loadBuildings();
    }, 200);
  </script>
</body>
</html>
